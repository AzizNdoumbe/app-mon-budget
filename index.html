        </div>
        {chargesFixes.length > 0 && (
          <div className="mt-4 pt-4 border-t border-slate-100 dark:border-slate-800 flex items-center justify-between">
            <span className="font-semibold">Total</span>
            <span className="font-display font-black text-xl">{fm(chargesFixes.reduce((s, c) => s + pa(c.montant), 0))}</span>
          </div>
        )}
      </Sheet>

      <Sheet open={modal === 'newCharge'} onClose={() => setModal(null)} title="Nouvelle charge fixe">
        <form onSubmit={addCharge} className="space-y-4">
          <TextIn label="Nom" value={newCharge.nom} onChange={(e) => setNewCharge({ ...newCharge, nom: e.target.value })} placeholder="Ex: Loyer, Netflix…" autoFocus required />
          <TextIn label="Montant (€)" type="number" step="0.01" inputMode="decimal" value={newCharge.montant} onChange={(e) => setNewCharge({ ...newCharge, montant: e.target.value })} placeholder="0,00" required />
          <SelectIn label="Jour de prélèvement" value={newCharge.jourPaiement} onChange={(e) => setNewCharge({ ...newCharge, jourPaiement: e.target.value })}>
            {Array.from({ length: 31 }, (_, i) => i + 1).map(d => <option key={d} value={d}>Le {d}</option>)}
          </SelectIn>
          <div className="flex gap-2">
            <BtnGhost type="button" onClick={() => setModal('charges')} className="flex-1">Annuler</BtnGhost>
            <BtnPrimary type="submit" className="flex-1">Ajouter</BtnPrimary>
          </div>
        </form>
      </Sheet>

      <Sheet open={modal === 'goal'} onClose={() => { setModal(null); setEditingGoal(null); }} title={editingGoal ? 'Modifier objectif' : 'Nouvel objectif'}>
        <form onSubmit={addGoal} className="space-y-4">
          <TextIn label="Nom" type="text" value={newGoal.nom} onChange={(e) => setNewGoal({ ...newGoal, nom: e.target.value })} placeholder="Ex: Vacances, Livret A, Nouvel ordi…" autoFocus required />
          {Object.values(budget.categories).some(c => normStr(c.nom) === normStr(newGoal.nom)) && (
            <div className="p-3 rounded-xl bg-emerald-50 dark:bg-emerald-950/40 text-xs text-emerald-900 dark:text-emerald-200">
              🔗 Une catégorie porte ce nom — les dépenses s'ajouteront automatiquement
            </div>
          )}
          <Field label="Icône">
            <EmojiPicker value={newGoal.emoji} onChange={(e) => setNewGoal({ ...newGoal, emoji: e })} compact />
          </Field>
          <div className="grid grid-cols-2 gap-3">
            <TextIn label="Montant cible (€)" type="number" step="0.01" value={newGoal.cible} onChange={(e) => setNewGoal({ ...newGoal, cible: e.target.value })} placeholder="1000" required />
            <TextIn label="Déjà épargné (€)" type="number" step="0.01" value={newGoal.actuel} onChange={(e) => setNewGoal({ ...newGoal, actuel: e.target.value })} placeholder="0" />
          </div>
          <TextIn label="Date limite (optionnel)" type="date" value={newGoal.deadline} onChange={(e) => setNewGoal({ ...newGoal, deadline: e.target.value })} />
          <Field label="Couleur">
            <div className="flex flex-wrap gap-2">
              {PALETTE.map(c => (
                <button key={c} type="button" onClick={() => setNewGoal({ ...newGoal, color: c })}
                        className={`w-9 h-9 rounded-xl transition ${newGoal.color === c ? 'ring-4 ring-offset-2 ring-slate-400 dark:ring-offset-slate-900' : ''}`}
                        style={{ backgroundColor: c }}></button>
              ))}
            </div>
          </Field>
          <div className="flex gap-2">
            <BtnGhost type="button" onClick={() => { setModal(null); setEditingGoal(null); }} className="flex-1">Annuler</BtnGhost>
            <BtnPrimary type="submit" className="flex-1">{editingGoal ? 'Enregistrer' : 'Créer'}</BtnPrimary>
          </div>
        </form>
      </Sheet>

      <Sheet open={modal === 'newAbo'} onClose={() => setModal(null)} title="Nouvel abonnement">
        <form onSubmit={addAbo} className="space-y-4">
          <TextIn label="Nom" type="text" value={newAbo.nom} onChange={(e) => setNewAbo({ ...newAbo, nom: e.target.value })} placeholder="Ex: Netflix, Spotify…" autoFocus required />
          <Field label="Icône">
            <EmojiPicker value={newAbo.emoji} onChange={(e) => setNewAbo({ ...newAbo, emoji: e })} compact />
          </Field>
          <TextIn label="Montant mensuel (€)" type="number" step="0.01" value={newAbo.montant} onChange={(e) => setNewAbo({ ...newAbo, montant: e.target.value })} placeholder="0,00" required />
          <SelectIn label="Catégorie" value={newAbo.categorie} onChange={(e) => setNewAbo({ ...newAbo, categorie: e.target.value })}>
            {Object.entries(budget.categories).map(([k, c]) => <option key={k} value={k}>{c.icon} {c.nom}</option>)}
            <option value="depense">💸 Autre</option>
          </SelectIn>
          <SelectIn label="Jour de prélèvement" value={newAbo.jour} onChange={(e) => setNewAbo({ ...newAbo, jour: e.target.value })}>
            {Array.from({ length: 31 }, (_, i) => i + 1).map(d => <option key={d} value={d}>Le {d}</option>)}
          </SelectIn>
          <div className="p-4 rounded-xl bg-violet-50 dark:bg-violet-950/40 text-sm text-violet-900 dark:text-violet-200">🔁 Ajouté automatiquement en dépense chaque mois.</div>
          <div className="flex gap-2">
            <BtnGhost type="button" onClick={() => setModal(null)} className="flex-1">Annuler</BtnGhost>
            <BtnPrimary type="submit" className="flex-1">Ajouter</BtnPrimary>
          </div>
        </form>
      </Sheet>

      <Sheet open={modal?.type === 'catDetail'} onClose={() => setModal(null)}
             title={modal?.type === 'catDetail' ? budget.categories[modal.key]?.nom : ''} size="md">
        {modal?.type === 'catDetail' && (() => {
          const cat = budget.categories[modal.key];
          if (!cat) return null;
          const catDeps = depenses.filter(d => {
            const dd = new Date(d.date);
            const now = new Date();
            return d.categorie === modal.key && dd.getMonth() === now.getMonth() && dd.getFullYear() === now.getFullYear();
          });
          const dep = monthlyTotals[modal.key] || 0;
          const pct = cat.budget > 0 ? (dep / cat.budget) * 100 : 0;
          return (
            <div>
              <div className="rounded-2xl p-5 mb-4" style={{ background: `linear-gradient(135deg, ${cat.color}22, transparent 70%)` }}>
                <div className="flex items-center gap-4 mb-4">
                  <div className="relative">
                    <Ring value={Math.min(pct, 100)} max={100} size={80} stroke={7} color={cat.color} />
                    <div className="absolute inset-0 flex items-center justify-center text-3xl">{cat.icon}</div>
                  </div>
                  <div>
                    <div className="font-display font-black text-3xl">{fm(dep)}</div>
                    <div className="text-sm text-slate-500">sur {fm(cat.budget)}</div>
                  </div>
                </div>
                <div className="flex items-center justify-between text-sm">
                  <span>Restant</span>
                  <span className={`font-bold ${cat.budget - dep < 0 ? 'text-rose-500' : ''}`}>{fm(cat.budget - dep)}</span>
                </div>
              </div>
              {catDeps.length === 0 ? (
                <div className="py-8 text-center text-sm text-slate-500">Aucune dépense ce mois-ci</div>
              ) : (
                <div className="space-y-2">
                  <div className="text-xs font-semibold uppercase tracking-wider text-slate-500 mb-2">{catDeps.length} transaction{catDeps.length > 1 ? 's' : ''}</div>
                  {catDeps.map(d => (
                    <div key={d.id} className="flex items-center gap-3 p-3 rounded-xl bg-slate-50 dark:bg-slate-800/50">
                      <div className="w-9 h-9 rounded-xl flex items-center justify-center text-base shrink-0" style={{ backgroundColor: cat.color + '22' }}>{d.emoji || cat.icon}</div>
                      <div className="flex-1 min-w-0">
                        <div className="font-semibold truncate">{d.description || cat.nom}</div>
                        <div className="text-xs text-slate-500">{dateLab(d.date)}</div>
                      </div>
                      <div className="font-display font-bold">-{fm(d.montant)}</div>
                    </div>
                  ))}
                </div>
              )}
            </div>
          );
        })()}
      </Sheet>

    </div>
  );
};

const Root = () => <ToastProvider><App /></ToastProvider>;
ReactDOM.createRoot(document.getElementById('root')).render(<Root />);
</script>
</body>
</html>
