  /* ─────── INVESTMENT ─────── */
  const InvestmentView = ({ type }) => {
    const cfg = type === 'pea'
      ? { title: 'PEA', subtitle: "Plan d'Épargne en Actions", emoji: '📈', solde: soldePEA, setS: setSoldePEA, key: 'pea', rate: 0.07 }
      : { title: 'Crypto', subtitle: 'Cryptomonnaies', emoji: '🪙', solde: soldeCrypto, setS: setSoldeCrypto, key: 'crypto', rate: 0.15 };

    const now = new Date();
    const vMois = depenses.filter(d => d.categorie === cfg.key && new Date(d.date).getMonth() === now.getMonth() && new Date(d.date).getFullYear() === now.getFullYear());
    const totalMois = vMois.reduce((s, d) => s + pa(d.montant), 0);
    const allVersements = depenses.filter(d => d.categorie === cfg.key);
    const autoInvesti = allVersements.reduce((s, d) => s + pa(d.montant), 0);
    const ov = investTotal?.[cfg.key];
    const isOverridden = !!(ov && typeof ov === 'object' && typeof ov.base === 'number');
    const sinceDate = isOverridden ? new Date(ov.since) : null;
    const versementsAfterBase = isOverridden
      ? allVersements.filter(d => new Date(d.date) > sinceDate).reduce((s, d) => s + pa(d.montant), 0)
      : 0;
    const totalInvesti = isOverridden ? (ov.base + versementsAfterBase) : autoInvesti;
    const objectif = budget.categories[cfg.key]?.budget || 100;
    const plusValue = cfg.solde - totalInvesti;
    const plusValuePct = totalInvesti > 0 ? (plusValue / totalInvesti) * 100 : 0;
    const lastUpd = investUpdates?.[cfg.key];
    const lastUpdLabel = lastUpd ? (() => {
      const d = new Date(lastUpd);
      const date = d.toLocaleDateString('fr-FR', { day: '2-digit', month: '2-digit', year: 'numeric' });
      const h = d.getHours().toString().padStart(2, '0');
      const m = d.getMinutes().toString().padStart(2, '0');
      return `Mis à jour le ${date} à ${h}h${m}`;
    })() : 'Aucune mise à jour enregistrée';
    const ref = useRef(null), inst = useRef(null);

    const project = (y, m, r) => { const n = y * 12; const rm = r / 12; return m * (((1 + rm) ** n - 1) / rm) * (1 + rm); };

    useEffect(() => {
      if (!ref.current) return;
      if (inst.current) inst.current.destroy();
      const ctx = ref.current.getContext('2d');
      const years = [5, 10, 15, 20, 30];
      const vals = years.map(y => cfg.solde * Math.pow(1 + cfg.rate, y) + project(y, objectif, cfg.rate));
      const inkColor = darkMode ? '#e2e8f0' : 'oklch(0.22 0.02 250)';
      const gridColor = darkMode ? 'rgba(148,163,184,.08)' : 'oklch(0.93 0.004 80)';
      const tickColor = darkMode ? '#94a3b8' : 'oklch(0.60 0.01 250)';
      inst.current = new Chart(ctx, {
        type: 'bar',
        data: {
          labels: years.map(y => `${y} ans`),
          datasets: [{
            data: vals,
            backgroundColor: inkColor,
            borderRadius: 4, borderSkipped: false,
            barThickness: 32,
          }]
        },
        options: {
          responsive: true, maintainAspectRatio: false,
          plugins: { legend: { display: false }, tooltip: { callbacks: { label: c => fm(c.parsed.y, { compact: true }) } } },
          scales: {
            y: { grid: { color: gridColor, drawBorder: false }, ticks: { color: tickColor, font: { family: 'Geist Mono, ui-monospace', size: 11 }, callback: v => fm(v, { compact: true }) } },
            x: { grid: { display: false }, ticks: { color: tickColor, font: { family: 'Geist, sans-serif', size: 11.5 } } }
          }
        }
      });
      return () => inst.current?.destroy();
    }, [cfg.solde, objectif, cfg.rate, type, darkMode]);

    return (
      <div className="space-y-5 animate-fade-in">
        <div>
          <div className="eyebrow mb-1">{cfg.emoji} Investissements</div>
          <h2 className="text-[24px] font-semibold tracking-[-0.02em] m-0">{cfg.title}</h2>
          <p className="text-[13px] text-[var(--ink-mute)] mt-1">{cfg.subtitle}</p>
        </div>

        <div className="grid grid-cols-1 lg:grid-cols-3 gap-[18px]">
          {/* Hero — ink fill */}
          <div className="kpi-hero-ed lg:col-span-2">
            <div className="flex items-center justify-between">
              <div className="label">Valeur actuelle</div>
            </div>
            <div className="val num"><Amount v={cfg.solde} /></div>
            <div className="grid grid-cols-3 gap-4 max-w-md relative z-[1]">
              <div>
                <div className="text-[10px] uppercase tracking-[0.10em] font-medium" style={{ color: '#ffffffaa' }}>Versé ce mois</div>
                <div className="font-semibold text-[16px] num mt-0.5"><Amount v={totalMois} compact /></div>
              </div>
              <div>
                <div className="text-[10px] uppercase tracking-[0.10em] font-medium" style={{ color: '#ffffffaa' }}>Total versé</div>
                <div className="font-semibold text-[16px] num mt-0.5"><Amount v={totalInvesti} compact /></div>
              </div>
              <div>
                <div className="text-[10px] uppercase tracking-[0.10em] font-medium" style={{ color: '#ffffffaa' }}>Plus-value</div>
                <div className="font-semibold text-[16px] num mt-0.5"><Amount v={plusValue} compact forceSign /></div>
              </div>
            </div>
            <div className="ctas mt-5">
              <button onClick={() => {
                        const v = prompt(`Valeur actuelle ${cfg.title} :`, cfg.solde.toFixed(2));
                        if (v !== null) { const n = parseFloat(v.replace(',','.')); if (!isNaN(n)) { cfg.setS(n); setInvestUpdates(p => ({ ...p, [cfg.key]: Date.now() })); } }
                      }}
                      className="btn-ed btn-light-ed">
                Mettre à jour la valeur
              </button>
            </div>
            <div className="text-[11px] mt-2" style={{ color: '#ffffff99' }}>{lastUpdLabel}</div>
          </div>

          <div className="editorial-card">
            <div className="flex items-start justify-between mb-2.5">
              <div>
                <div className="eyebrow mb-0.5">Objectif</div>
                <h3 className="card-title-ed">Mensuel</h3>
              </div>
              <button onClick={() => {
                        const v = prompt(`Nouvel objectif mensuel :`, objectif);
                        if (v !== null) { const n = pa(v); if (n >= 0) setBudget({ ...budget, categories: { ...budget.categories, [cfg.key]: { ...budget.categories[cfg.key], budget: n } } }); }
                      }}
                      className="link-more">Modifier →</button>
            </div>
            <div className="flex items-end justify-between mb-2">
              <div className="text-[24px] font-semibold tracking-[-0.025em] num leading-none">{fm(totalMois)}</div>
              <div className="text-[12.5px] text-[var(--ink-mute)] num">/ {fm(objectif)}</div>
            </div>
            <div className="h-1.5 rounded-full overflow-hidden mb-3" style={{ background: 'var(--bg-2)' }}>
              <div className="h-full rounded-full" style={{ width: `${Math.min((totalMois / objectif) * 100, 100)}%`, background: totalMois >= objectif ? 'var(--positive)' : 'var(--ink)' }}></div>
            </div>
            {totalMois >= objectif ? (
              <div className="text-center text-[12.5px] font-medium text-[var(--positive)]">Objectif atteint</div>
            ) : (
              <div className="text-center text-[12.5px] text-[var(--ink-mute)]">Encore {fm(objectif - totalMois)} ce mois-ci</div>
            )}
          </div>
        </div>

        <div className="grid grid-cols-1 md:grid-cols-3 gap-[18px]">
          <div className="editorial-card">
            <div className="flex items-center justify-between mb-1">
              <div className="eyebrow">Total versé depuis le début</div>
              <button onClick={() => {
                        const v = prompt(`Total versé ${cfg.title} à ce jour :\n(les versements ajoutés ensuite s'additionneront automatiquement)`, totalInvesti.toFixed(2));
                        if (v === null) return;
                        const s = v.trim();
                        if (s === '') { setInvestTotal(p => ({ ...p, [cfg.key]: null })); toast('Retour au calcul auto', 'success'); return; }
                        const n = parseFloat(s.replace(',', '.'));
                        if (!isNaN(n) && n >= 0) {
                          setInvestTotal(p => ({ ...p, [cfg.key]: { base: n, since: new Date().toISOString() } }));
                          toast('Total versé modifié', 'success');
                        }
                      }}
                      className="link-more">Modifier</button>
            </div>
            <div className="text-[24px] font-semibold tracking-[-0.025em] num"><Amount v={totalInvesti} /></div>
            <div className="text-[11.5px] text-[var(--ink-mute)] mt-1">
              {isOverridden ? (
                <span className="inline-flex items-center gap-1 flex-wrap">
                  <span className="w-1.5 h-1.5 rounded-full" style={{ background: 'var(--accent)' }}></span>
                  Base {fm(ov.base, { compact: true })} + {fm(versementsAfterBase, { compact: true })} ajoutés · <button onClick={() => { setInvestTotal(p => ({ ...p, [cfg.key]: null })); toast('Retour au calcul auto'); }} className="underline hover:text-[var(--ink)]">réinitialiser</button>
                </span>
              ) : (
                <>{allVersements.length} versement{allVersements.length > 1 ? 's' : ''} cumulés</>
              )}
            </div>
          </div>
          <div className="editorial-card">
            <div className="eyebrow mb-1">{plusValue >= 0 ? 'Plus-value' : 'Moins-value'} nette</div>
            <div className={`text-[24px] font-semibold tracking-[-0.025em] num ${plusValue > 0 ? 'text-[var(--positive)]' : plusValue < 0 ? 'text-[var(--negative)]' : ''}`}>
              <Amount v={plusValue} forceSign />
            </div>
            <div className="text-[11.5px] text-[var(--ink-mute)] mt-1">
              {totalInvesti > 0 ? `${plusValue >= 0 ? '+' : ''}${plusValuePct.toFixed(1)}% de rendement` : 'Valeur actuelle − total versé'}
            </div>
          </div>
          <div className="editorial-card">
            <div className="eyebrow mb-1">Versements ce mois-ci</div>
            <div className="text-[24px] font-semibold tracking-[-0.025em] num"><Amount v={totalMois} /></div>
            <div className="text-[11.5px] text-[var(--ink-mute)] mt-1">{vMois.length} transaction{vMois.length > 1 ? 's' : ''}</div>
          </div>
        </div>

        <div className="grid grid-cols-1 lg:grid-cols-3 gap-[18px]">
          <div className="editorial-card lg:col-span-2">
            <div className="mb-4">
              <div className="eyebrow mb-0.5">Long terme</div>
              <h2 className="card-title-ed">Projection</h2>
              <div className="text-[11.5px] text-[var(--ink-mute)] mt-1">Avec {fm(objectif)}/mois + solde actuel, à {(cfg.rate * 100).toFixed(0)}% annuel</div>
            </div>
            <div style={{ height: 280 }}><canvas ref={ref}></canvas></div>
          </div>

          <div className="editorial-card flex flex-col" style={{ maxHeight: 480 }}>
            <div className="flex items-center justify-between mb-3 shrink-0">
              <div>
                <div className="eyebrow mb-0.5">Historique</div>
                <h3 className="card-title-ed">Versements</h3>
                <p className="text-[11px] text-[var(--ink-mute)] mt-0.5 num">{allVersements.length} au total · {fm(autoInvesti, { compact: true })}</p>
              </div>
            </div>
            {allVersements.length === 0 ? (
              <div className="py-6 text-center text-sm text-[var(--ink-mute)]">Aucun versement enregistré</div>
            ) : (
              <div className="space-y-2 overflow-y-auto pr-1 -mr-1 relative" style={{ maskImage: 'linear-gradient(to bottom, black 85%, transparent 100%)', WebkitMaskImage: 'linear-gradient(to bottom, black 85%, transparent 100%)' }}>
                {[...allVersements]
                  .sort((a, b) => new Date(b.date) - new Date(a.date))
                  .map(d => (
                    <div key={d.id} className="flex items-center gap-3 py-2">
                      <div className="tx-ic">{d.emoji || cfg.emoji}</div>
                      <div className="flex-1 min-w-0">
                        <div className="font-medium text-[13.5px] truncate">{d.description || `Versement ${cfg.title}`}</div>
                        <div className="text-[11px] text-[var(--ink-mute)] mt-0.5">{new Date(d.date).toLocaleDateString('fr-FR', { day: '2-digit', month: 'short', year: 'numeric' })}</div>
                      </div>
                      <div className="font-semibold text-[13.5px] num shrink-0" style={{ color: 'var(--positive)' }}>+{fm(d.montant, { compact: true })}</div>
                    </div>
                  ))}
              </div>
            )}
          </div>
        </div>
      </div>
    );
  };

  /* ─────── STATS ─────── */
  const StatsView = () => {
    const [selK, setSelK] = useState(currMK);
    const lineRef = useRef(null), lineI = useRef(null);
    const donutRef = useRef(null), donutI = useRef(null);

    const getTotals = (k) => {
      const t = {};
      Object.keys(budget.categories).forEach(x => t[x] = 0);
      t.exceptionnel = 0; t.depense = 0;
      depenses.forEach(d => {
        if (mk(new Date(d.date)) === k) t[d.categorie] = (t[d.categorie] || 0) + pa(d.montant);
      });
      return t;
    };

    const isCurr = selK === currMK;
    const totals = isCurr ? getTotals(selK) : (statsArch[selK]?.depenses || getTotals(selK));
    const total = Object.values(totals).reduce((s, v) => s + v, 0);
    const availMonths = useMemo(() => {
      const all = new Set([currMK, ...Object.keys(statsArch)]);
      depenses.forEach(d => { all.add(mk(new Date(d.date))); });
      return Array.from(all).sort().reverse();
    }, [statsArch, depenses, currMK]);

    const trendData = useMemo(() => {
      const months = [];
      const now = new Date();
      for (let i = 11; i >= 0; i--) {
        const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
        const y = d.getFullYear(), m = d.getMonth();
        let total = 0;
        depenses.forEach(dep => {
          const dd = new Date(dep.date);
          if (dd.getFullYear() === y && dd.getMonth() === m) total += pa(dep.montant);
        });
        months.push({ label: d.toLocaleDateString('fr-FR', { month: 'short' }), total });
      }
      return months;
    }, [depenses]);

    useEffect(() => {
      if (!lineRef.current) return;
      if (lineI.current) lineI.current.destroy();
      const ctx = lineRef.current.getContext('2d');
      const inkColor = darkMode ? '#e2e8f0' : 'oklch(0.22 0.02 250)';
      const accentColor = darkMode ? '#94a3b8' : 'oklch(0.30 0.07 245)';
      const gridColor = darkMode ? 'rgba(148,163,184,.08)' : 'oklch(0.93 0.004 80)';
      const tickColor = darkMode ? '#94a3b8' : 'oklch(0.60 0.01 250)';
      const g = ctx.createLinearGradient(0, 0, 0, 300);
      g.addColorStop(0, darkMode ? 'rgba(226,232,240,0.18)' : 'oklch(0.30 0.07 245 / 0.18)');
      g.addColorStop(1, 'transparent');
      lineI.current = new Chart(ctx, {
        type: 'line',
        data: { labels: trendData.map(d => d.label),
          datasets: [{ data: trendData.map(d => d.total), borderColor: inkColor, backgroundColor: g, fill: true, tension: 0.35, borderWidth: 1.8, pointRadius: 3, pointHoverRadius: 5, pointBackgroundColor: 'var(--surface)', pointBorderColor: inkColor, pointBorderWidth: 1.6 }] },
        options: {
          responsive: true, maintainAspectRatio: false,
          plugins: { legend: { display: false }, tooltip: { callbacks: { label: c => fm(c.parsed.y) } } },
          scales: {
            y: { beginAtZero: true, grid: { color: gridColor, drawBorder: false }, ticks: { color: tickColor, font: { family: 'Geist Mono, ui-monospace', size: 11 }, callback: v => fm(v, { compact: true }) } },
            x: { grid: { display: false }, ticks: { color: tickColor, font: { family: 'Geist, sans-serif', size: 11.5 } } }
          }
        }
      });
      return () => lineI.current?.destroy();
    }, [trendData, darkMode]);

    useEffect(() => {
      if (!donutRef.current) return;
      if (donutI.current) donutI.current.destroy();
      const entries = Object.entries(budget.categories)
        .map(([k, c]) => ({ k, c, d: totals[k] || 0 })).filter(x => x.d > 0).sort((a, b) => b.d - a.d);
      const others = (totals.exceptionnel || 0) + (totals.depense || 0);
      if (others > 0) entries.push({ k: '__other', c: { nom: 'Autres', color: '#64748b' }, d: others });
      if (entries.length === 0) return;
      donutI.current = new Chart(donutRef.current.getContext('2d'), {
        type: 'doughnut',
        data: {
          labels: entries.map(e => e.c.nom),
          datasets: [{ data: entries.map(e => e.d), backgroundColor: entries.map(e => e.c.color), borderWidth: 0 }]
        },
        options: {
          responsive: true, maintainAspectRatio: false, cutout: '72%',
          plugins: { legend: { display: false }, tooltip: { callbacks: { label: c => `${c.label}: ${fm(c.parsed)}` } } }
        }
      });
      return () => donutI.current?.destroy();
    }, [totals, budget.categories]);

    const topCats = Object.entries(budget.categories).map(([k, c]) => ({ k, c, d: totals[k] || 0 })).filter(x => x.d > 0).sort((a, b) => b.d - a.d);
    const dayCount = isCurr ? Math.max(1, new Date().getDate()) : 31;
    const txCount = depenses.filter(d => mk(new Date(d.date)) === selK).length;

    return (
      <div className="space-y-5 animate-fade-in">
        <div>
          <div className="eyebrow mb-1">Analyse</div>
          <h2 className="text-[24px] font-semibold tracking-[-0.02em] m-0">Statistiques</h2>
          <p className="text-[13px] text-[var(--ink-mute)] mt-1">Analysez et comprenez vos dépenses.</p>
        </div>

        <div className="editorial-card chart-card-ed">
          <div className="flex items-start justify-between mb-2">
            <div>
              <div className="eyebrow mb-0.5">12 derniers mois</div>
              <h2 className="text-[18px] font-semibold tracking-[-0.015em] m-0 mt-0.5">Évolution globale</h2>
            </div>
            {trendData.length >= 2 && (() => {
              const last = trendData[trendData.length - 1].total;
              const prev = trendData[trendData.length - 2].total;
              const diff = prev ? ((last - prev) / prev) * 100 : 0;
              const up = diff > 0;
              return (
                <span className={up ? 'pill-neg' : 'pill-pos'}>
                  {up ? <I.TrendUp s={10} sw={2.5} /> : <I.TrendDown s={10} sw={2.5} />} {diff > 0 ? '+' : ''}{diff.toFixed(0)}%
                </span>
              );
            })()}
          </div>
          <div style={{ height: 260, marginTop: 14 }}><canvas ref={lineRef}></canvas></div>
        </div>

        <div className="flex gap-2 overflow-x-auto pb-2 -mx-1 px-1">
          {availMonths.slice(0, 12).map(k => {
            const t = k === currMK ? Object.values(getTotals(k)).reduce((s, v) => s + v, 0) : (statsArch[k]?.total || Object.values(getTotals(k)).reduce((s, v) => s + v, 0));
            const sel = selK === k;
            return (
              <button key={k} onClick={() => setSelK(k)}
                      className="shrink-0 px-4 py-2.5 rounded-[10px] text-left transition btn-tap"
                      style={sel
                        ? { background: 'var(--ink)', color: '#fff', border: '1px solid var(--ink)' }
                        : { background: 'var(--surface)', color: 'var(--ink)', border: '1px solid var(--border)' }}>
                <div className="text-[10px] font-medium uppercase tracking-[0.10em]" style={{ opacity: sel ? 0.7 : 0.6 }}>{mShort(k)}</div>
                <div className="text-[13px] font-semibold num mt-0.5">{fm(t, { compact: true })}</div>
              </button>
            );
          })}
        </div>

        <div className="grid grid-cols-1 lg:grid-cols-3 gap-[18px]">
          <div className="editorial-card lg:col-span-1">
            <div className="eyebrow mb-1.5">{mName(selK)}</div>
            <div className="text-[28px] font-semibold tracking-[-0.025em] num mb-5">{fm(total)}</div>
            <div className="relative" style={{ height: 220 }}>
              {total > 0 ? <canvas ref={donutRef}></canvas> : <div className="h-full flex items-center justify-center text-sm text-[var(--ink-mute)]">Aucune donnée</div>}
            </div>
          </div>

          <div className="editorial-card lg:col-span-2">
            <div className="eyebrow mb-0.5">Catégories</div>
            <h3 className="text-[18px] font-semibold tracking-[-0.015em] m-0 mt-0.5 mb-5">Répartition</h3>
            {topCats.length === 0 ? (
              <div className="py-12 text-center text-sm text-[var(--ink-mute)]">Aucune dépense sur ce mois</div>
            ) : (
              <div className="space-y-4">
                {topCats.map(({ k, c, d }) => {
                  const pct = (d / total) * 100;
                  return (
                    <div key={k}>
                      <div className="flex items-center gap-3 mb-1.5">
                        <span className="text-[17px]">{c.icon}</span>
                        <span className="font-medium text-[14px] flex-1">{c.nom}</span>
                        <span className="text-[11.5px] font-medium text-[var(--ink-mute)] num">{pct.toFixed(0)}%</span>
                        <span className="font-semibold text-[14px] num">{fm(d)}</span>
                      </div>
                      <div className="h-1.5 rounded-full overflow-hidden" style={{ background: 'var(--bg-2)' }}>
                        <div className="h-full rounded-full" style={{ width: `${pct}%`, backgroundColor: c.color }}></div>
                      </div>
                    </div>
                  );
                })}
              </div>
            )}
          </div>
        </div>

        <div className="grid grid-cols-2 md:grid-cols-4 gap-[18px]">
          <div className="editorial-card">
            <div className="eyebrow mb-1">Moyenne/jour</div>
            <div className="text-[22px] font-semibold tracking-[-0.025em] num">{fm(total / Math.max(1, dayCount), { compact: true })}</div>
          </div>
          <div className="editorial-card">
            <div className="eyebrow mb-1">Transactions</div>
            <div className="text-[22px] font-semibold tracking-[-0.025em] num">{txCount}</div>
          </div>
          <div className="editorial-card">
            <div className="eyebrow mb-1">Panier moyen</div>
            <div className="text-[22px] font-semibold tracking-[-0.025em] num">{fm(txCount > 0 ? total / txCount : 0, { compact: true })}</div>
          </div>
          <div className="editorial-card">
            <div className="eyebrow mb-1">Top catégorie</div>
            <div className="text-[22px] font-semibold tracking-[-0.025em] truncate">{topCats[0] ? topCats[0].c.icon + ' ' + topCats[0].c.nom.split(' ')[0] : '—'}</div>
          </div>
        </div>
      </div>
    );
  };

  /* ─────── HISTORY ─────── */
  const HistoryView = () => {
    const filtered = useMemo(() => {
      const q = searchQuery.toLowerCase();
      return depenses.filter(d => {
        if (filterCat !== 'all' && d.categorie !== filterCat) return false;
        if (q && !(d.description || '').toLowerCase().includes(q)) return false;
        return true;
      });
    }, [depenses, searchQuery, filterCat]);

    const grouped = useMemo(() => {
      const g = {};
      filtered.forEach(d => { if (!g[d.date]) g[d.date] = []; g[d.date].push(d); });
      return Object.entries(g).sort((a, b) => b[0].localeCompare(a[0]));
    }, [filtered]);

    const totalFiltered = filtered.reduce((s, d) => s + pa(d.montant), 0);

    return (
      <div className="space-y-5 animate-fade-in">
        <div className="flex items-center justify-between flex-wrap gap-3">
          <div>
            <div className="eyebrow mb-1">Toutes les dépenses</div>
            <h2 className="text-[24px] font-semibold tracking-[-0.02em] m-0">Historique</h2>
            <p className="text-[13px] text-[var(--ink-mute)] mt-1 num">{filtered.length} transaction{filtered.length > 1 ? 's' : ''} · {fm(totalFiltered)}</p>
          </div>
          <BtnGhost onClick={exportCSV}>
            <I.Download s={14} /> Exporter CSV
          </BtnGhost>
        </div>

        <div className="editorial-card">
          <div className="relative mb-4">
            <I.Search s={16} cn="absolute left-3.5 top-1/2 -translate-y-1/2 pointer-events-none" />
            <input type="text" value={searchQuery} onChange={(e) => setSearchQuery(e.target.value)} placeholder="Rechercher une description…"
                   className="w-full pl-10 pr-4 py-2.5 rounded-[10px] outline-none transition"
                   style={{ background: 'var(--bg-2)', border: '1px solid var(--border)', color: 'var(--ink)' }} />
          </div>
          <div className="flex gap-2 overflow-x-auto scrollbar-hide">
            <button onClick={() => setFilterCat('all')}
                    className="shrink-0 px-3.5 py-1.5 rounded-full text-[11.5px] font-medium whitespace-nowrap transition"
                    style={filterCat === 'all'
                      ? { background: 'var(--ink)', color: '#fff' }
                      : { background: 'var(--bg-2)', color: 'var(--ink-soft)', border: '1px solid var(--border)' }}>
              Toutes ({depenses.length})
            </button>
            {Object.entries(budget.categories).map(([k, c]) => {
              const n = depenses.filter(d => d.categorie === k).length;
              if (!n) return null;
              const sel = filterCat === k;
              return (
                <button key={k} onClick={() => setFilterCat(k)}
                        className="shrink-0 flex items-center gap-1.5 px-3.5 py-1.5 rounded-full text-[11.5px] font-medium whitespace-nowrap transition"
                        style={sel
                          ? { background: 'var(--ink)', color: '#fff' }
                          : { background: 'var(--bg-2)', color: 'var(--ink-soft)', border: '1px solid var(--border)' }}>
                  {c.icon} {c.nom} ({n})
                </button>
              );
            })}
          </div>
        </div>

        {grouped.length === 0 ? (
          <div className="editorial-card p-12 text-center">
            <div className="text-4xl mb-3">🔍</div>
            <div className="text-[13px] text-[var(--ink-mute)]">Aucune dépense trouvée</div>
          </div>
        ) : (
          <div className="space-y-5">
            {grouped.map(([date, items]) => {
              const total = items.reduce((s, d) => s + pa(d.montant), 0);
              return (
                <div key={date}>
                  <div className="flex items-center justify-between mb-2 px-1">
                    <div className="eyebrow">{dateLab(date)}</div>
                    <div className="text-[11.5px] font-medium text-[var(--ink-mute)] num">−{fm(total)}</div>
                  </div>
                  <div className="editorial-card overflow-hidden p-0">
                    {items.map((d, idx) => {
                      const c = d.categorie === 'exceptionnel' ? { nom: 'Exceptionnel', color: '#ef4444', icon: '⚠️' }
                        : d.categorie === 'depense' ? { nom: 'Autre', color: '#6b7280', icon: '💸' }
                        : budget.categories[d.categorie] || { nom: d.categorie, color: '#6b7280', icon: '📊' };
                      const displayIcon = d.emoji || c.icon;
                      return (
                        <div key={d.id} className="grid grid-cols-[36px_1fr_auto] gap-3 items-center px-4 py-3 group transition"
                             style={{ borderTop: idx > 0 ? '1px solid var(--border)' : 'none' }}>
                          <div className="tx-ic" style={{ background: c.color + '18', color: c.color, borderColor: c.color + '33' }}>{displayIcon}</div>
                          <div className="min-w-0">
                            <div className="font-medium text-[13.5px] truncate">{d.description || c.nom}</div>
                            <div className="text-[11.5px] text-[var(--ink-mute)] mt-0.5">{c.nom}</div>
                          </div>
                          <div className="text-right">
                            <div className="font-semibold text-[14px] num whitespace-nowrap">−{fm(d.montant)}</div>
                            <button onClick={() => { if (confirm('Supprimer cette dépense ?')) deleteDepense(d.id); }}
                                    className="text-[11px] text-[var(--negative)] hover:underline opacity-0 group-hover:opacity-100 transition">
                              Supprimer
                            </button>
                          </div>
                        </div>
                      );
                    })}
                  </div>
                </div>
              );
            })}
          </div>
        )}
      </div>
    );
  };

  /* ─────── SETTINGS ─────── */
  const SettingsView = () => {
    const [editForm, setEditForm] = useState({ nom: '', budget: '', color: '#8b5cf6', icon: '📊', showInDashboard: true });

    const saveCategory = () => {
      if (!editForm.nom || !editForm.budget) return;
      if (editingCat === '__new__') {
        const key = editForm.nom.toLowerCase().replace(/\s+/g, '_').replace(/[^a-z0-9_]/g, '');
        if (!key || budget.categories[key]) { toast('Nom déjà utilisé', 'error'); return; }
        setBudget({ ...budget, categories: { ...budget.categories, [key]: { nom: editForm.nom, budget: pa(editForm.budget), color: editForm.color, icon: editForm.icon, showInDashboard: editForm.showInDashboard } } });
      } else {
        setBudget({ ...budget, categories: { ...budget.categories, [editingCat]: { ...budget.categories[editingCat], nom: editForm.nom, budget: pa(editForm.budget), color: editForm.color, icon: editForm.icon, showInDashboard: editForm.showInDashboard } } });
      }
      setEditingCat(null);
      toast('Enregistré', 'success');
    };

    const startEdit = (key) => {
      const c = budget.categories[key];
      setEditForm({ nom: c.nom, budget: String(c.budget), color: c.color, icon: c.icon || '📊', showInDashboard: c.showInDashboard !== false });
      setEditingCat(key);
    };

    return (
      <div className="space-y-5 animate-fade-in">
        <div>
          <div className="eyebrow mb-1">Préférences</div>
          <h2 className="text-[24px] font-semibold tracking-[-0.02em] m-0">Paramètres</h2>
          <p className="text-[13px] text-[var(--ink-mute)] mt-1">Personnalisez votre application.</p>

                <EmojiPicker value={newDepense.emoji} onChange={(e) => { setNewDepense({ ...newDepense, emoji: e }); setShowEmojiPicker(false); }} compact />
                {newDepense.emoji && (
                  <button type="button" onClick={() => setNewDepense({ ...newDepense, emoji: '' })} className="mt-2 text-[11.5px] text-[var(--ink-mute)] hover:text-[var(--negative)]">Retirer l'emoji</button>
                )}
              </div>
            )}
          </div>
          <TextIn label="Date" type="date" value={newDepense.date} onChange={(e) => setNewDepense({ ...newDepense, date: e.target.value })} required />
          <label className="flex items-start gap-3 p-3 rounded-[10px] cursor-pointer"
                 style={{ background: 'var(--bg-2)', border: '1px solid var(--border)' }}>
            <input type="checkbox" checked={newDepense.deduireDuSolde} onChange={(e) => setNewDepense({ ...newDepense, deduireDuSolde: e.target.checked })} className="mt-0.5 w-5 h-5 rounded" style={{ accentColor: 'var(--ink)' }} />
            <div>
              <div className="text-[13px] font-medium">Déduire du solde</div>
              <div className="text-[11.5px] text-[var(--ink-mute)] mt-0.5">Décochez pour une dépense déjà comptabilisée</div>
            </div>
          </label>
          <div className="flex gap-2 pt-1">
            <BtnGhost type="button" onClick={() => setModal(null)} className="flex-1">Annuler</BtnGhost>
            <BtnPrimary type="submit" className="flex-1">Ajouter</BtnPrimary>
          </div>
        </form>
      </Sheet>

      <Sheet open={healthDetailOpen} onClose={() => setHealthDetailOpen(false)} title="Analyse du budget" size="lg">
        <div className="space-y-4">
          <div className="editorial-card flex items-center gap-5">
            <div className="relative">
              <Ring value={healthScore} max={100} size={88} stroke={7} color={healthScore > 75 ? 'oklch(0.55 0.12 155)' : healthScore > 50 ? 'oklch(0.55 0.12 155)' : healthScore > 25 ? 'oklch(0.72 0.13 75)' : 'oklch(0.58 0.18 25)'} />
              <div className="absolute inset-0 flex items-center justify-center text-[24px] font-semibold tracking-[-0.02em] num">{healthScore}</div>
            </div>
            <div className="flex-1">
              <div className="text-[22px] font-semibold tracking-[-0.02em]">{budgetHealth.level}</div>
              <div className="text-[13px] text-[var(--ink-soft)] mt-1">Score calculé à partir de vos dépenses du mois</div>
              <div className="text-[11.5px] text-[var(--ink-mute)] mt-1.5">{budgetHealth.insights.length} observation{budgetHealth.insights.length > 1 ? 's' : ''}</div>
            </div>
          </div>

          {budgetHealth.insights.length === 0 ? (
            <div className="editorial-card p-10 text-center">
              <div className="text-4xl mb-3">📊</div>
              <div className="text-[13px] text-[var(--ink-mute)]">Ajoutez quelques dépenses pour une analyse complète.</div>
            </div>
          ) : (
            <div className="space-y-2">
              {budgetHealth.insights.map((i, idx) => {
                const colorMap = {
                  high: { bg: 'var(--negative-soft)', col: 'var(--negative)' },
                  med: { bg: 'oklch(0.97 0.04 75)', col: 'oklch(0.50 0.13 75)' },
                  low: { bg: 'var(--accent-soft)', col: 'var(--accent)' },
                  good: { bg: 'var(--positive-soft)', col: 'var(--positive)' }
                };
                const cm = colorMap[i.severity] || colorMap.low;
                return (
                  <div key={idx} className="rounded-[12px] p-4 flex items-start gap-3"
                       style={{ background: cm.bg, border: '1px solid ' + cm.bg }}>
                    <div className="text-[22px] shrink-0">{i.emoji}</div>
                    <div className="flex-1 min-w-0">
                      <div className="font-medium text-[14px]" style={{ color: cm.col }}>{i.title}</div>
                      <div className="text-[12.5px] text-[var(--ink-soft)] mt-0.5">{i.detail}</div>
                    </div>
                  </div>
                );
              })}
            </div>
          )}

          <div className="text-[11px] text-[var(--ink-mute)] text-center pt-2">
            Analyse locale basée sur des patterns comportementaux — aucune donnée transmise.
          </div>
        </div>
      </Sheet>

      <Sheet open={modal === 'revenu'} onClose={() => setModal(null)} title="Ajouter un revenu">
        <form onSubmit={addRevenu} className="space-y-4">
          <SelectIn label="Type" value={newRevenu.type} onChange={(e) => setNewRevenu({ ...newRevenu, type: e.target.value })}>
            <option value="Salaire">💼 Salaire</option>
            <option value="CAF">🏛️ CAF</option>
            <option value="Virement">💸 Virement</option>
            <option value="Remboursement">💰 Remboursement</option>
            <option value="Autre">✨ Autre</option>
          </SelectIn>
          <TextIn label="Montant (€)" type="number" step="0.01" inputMode="decimal" value={newRevenu.montant} onChange={(e) => setNewRevenu({ ...newRevenu, montant: e.target.value })} placeholder="0,00" autoFocus required />
          <div className="p-3 rounded-[10px] text-[12.5px]"
               style={{ background: 'var(--positive-soft)', color: 'var(--positive)', border: '1px solid var(--positive-soft)' }}>
            Ce montant sera ajouté à votre solde actuel.
          </div>
          <div className="flex gap-2">
            <BtnGhost type="button" onClick={() => setModal(null)} className="flex-1">Annuler</BtnGhost>
            <BtnPrimary type="submit" className="flex-1">Ajouter</BtnPrimary>
          </div>
        </form>
      </Sheet>

      <Sheet open={modal === 'charges'} onClose={() => setModal(null)} title="Charges fixes" size="lg">
        <button onClick={() => setModal('newCharge')} className="w-full mb-4 p-3 rounded-[10px] text-[13px] font-medium btn-tap transition"
                style={{ background: 'transparent', color: 'var(--ink-soft)', border: '1.5px dashed var(--border-strong)' }}>
          + Ajouter une charge
        </button>
        <div className="space-y-2">
          {[...chargesFixes].sort((a, b) => dayPos(a.jourPaiement, anchorSalaryDay) - dayPos(b.jourPaiement, anchorSalaryDay)).map(c => {
            const paid = chargesPayees[chargesPeriodKey]?.[c.id];
            return (
              <div key={c.id} className="rounded-[10px] p-3 flex items-center gap-3 transition"
                   style={{ background: paid ? 'var(--positive-soft)' : 'var(--bg-2)', border: '1px solid ' + (paid ? 'var(--positive-soft)' : 'var(--border)') }}>
                <button onClick={() => toggleCharge(c.id)}
                        className="w-7 h-7 rounded-[8px] flex items-center justify-center shrink-0"
                        style={paid
                          ? { background: 'var(--positive)', color: '#fff', border: '1px solid var(--positive)' }
                          : { background: 'var(--surface)', border: '1.5px solid var(--border-strong)', color: 'transparent' }}>
                  {paid && <I.Check s={14} sw={3} />}
                </button>
                <div className="flex-1 min-w-0">
                  <div className={`font-medium text-[14px] truncate ${paid ? 'line-through text-[var(--ink-mute)]' : ''}`}>{c.nom}</div>
                  <div className="text-[11.5px] text-[var(--ink-mute)]">Le {c.jourPaiement}</div>
                </div>
                <div className={`font-semibold text-[14px] num ${paid ? 'text-[var(--positive)]' : ''}`}>{fm(c.montant)}</div>
                <button onClick={() => { const v = prompt(`Modifier "${c.nom}" :`, c.montant.toFixed(2)); if (v !== null) { const n = parseFloat(v.replace(',','.')); if (!isNaN(n)) setChargesFixes(p => p.map(x => x.id === c.id ? { ...x, montant: n } : x)); } }}
                        className="w-7 h-7 rounded-[8px] flex items-center justify-center btn-tap"
                        style={{ background: 'var(--surface)', color: 'var(--ink-soft)', border: '1px solid var(--border)' }}><I.Edit s={12} /></button>
                <button onClick={() => { if (confirm(`Supprimer "${c.nom}" ?`)) setChargesFixes(p => p.filter(x => x.id !== c.id)); }}
                        className="w-7 h-7 rounded-[8px] flex items-center justify-center btn-tap"
                        style={{ background: 'var(--negative-soft)', color: 'var(--negative)' }}><I.Trash s={12} /></button>
              </div>
            );
          })}
        </div>
        {chargesFixes.length > 0 && (
          <div className="mt-4 pt-4 flex items-center justify-between" style={{ borderTop: '1px solid var(--border)' }}>
            <span className="font-medium text-[14px]">Total</span>
            <span className="text-[20px] font-semibold tracking-[-0.02em] num">{fm(chargesFixes.reduce((s, c) => s + pa(c.montant), 0))}</span>
          </div>
        )}
      </Sheet>

      <Sheet open={modal === 'newCharge'} onClose={() => setModal(null)} title="Nouvelle charge fixe">
        <form onSubmit={addCharge} className="space-y-4">
          <TextIn label="Nom" value={newCharge.nom} onChange={(e) => setNewCharge({ ...newCharge, nom: e.target.value })} placeholder="Ex: Loyer, Netflix…" autoFocus required />
          <TextIn label="Montant (€)" type="number" step="0.01" inputMode="decimal" value={newCharge.montant} onChange={(e) => setNewCharge({ ...newCharge, montant: e.target.value })} placeholder="0,00" required />
          <SelectIn label="Jour de prélèvement" value={newCharge.jourPaiement} onChange={(e) => setNewCharge({ ...newCharge, jourPaiement: e.target.value })}>
            {Array.from({ length: 31 }, (_, i) => i + 1).map(d => <option key={d} value={d}>Le {d}</option>)}
          </SelectIn>
          <div className="flex gap-2">
            <BtnGhost type="button" onClick={() => setModal('charges')} className="flex-1">Annuler</BtnGhost>
            <BtnPrimary type="submit" className="flex-1">Ajouter</BtnPrimary>
          </div>
        </form>
      </Sheet>

      <Sheet open={modal === 'goal'} onClose={() => { setModal(null); setEditingGoal(null); }} title={editingGoal ? 'Modifier objectif' : 'Nouvel objectif'}>
        <form onSubmit={addGoal} className="space-y-4">
          <TextIn label="Nom" type="text" value={newGoal.nom} onChange={(e) => setNewGoal({ ...newGoal, nom: e.target.value })} placeholder="Ex: Vacances, Livret A, Nouvel ordi…" autoFocus required />
          {Object.values(budget.categories).some(c => normStr(c.nom) === normStr(newGoal.nom)) && (
            <div className="p-3 rounded-[10px] text-[11.5px]"
                 style={{ background: 'var(--positive-soft)', color: 'var(--positive)', border: '1px solid var(--positive-soft)' }}>
              🔗 Une catégorie porte ce nom — les dépenses s'ajouteront automatiquement
            </div>
          )}
          <Field label="Icône">
            <EmojiPicker value={newGoal.emoji} onChange={(e) => setNewGoal({ ...newGoal, emoji: e })} compact />
          </Field>
          <div className="grid grid-cols-2 gap-3">
            <TextIn label="Montant cible (€)" type="number" step="0.01" value={newGoal.cible} onChange={(e) => setNewGoal({ ...newGoal, cible: e.target.value })} placeholder="1000" required />
            <TextIn label="Déjà épargné (€)" type="number" step="0.01" value={newGoal.actuel} onChange={(e) => setNewGoal({ ...newGoal, actuel: e.target.value })} placeholder="0" />
          </div>
          <TextIn label="Date limite (optionnel)" type="date" value={newGoal.deadline} onChange={(e) => setNewGoal({ ...newGoal, deadline: e.target.value })} />
          <Field label="Couleur">
            <div className="flex flex-wrap gap-2">
              {PALETTE.map(c => (
                <button key={c} type="button" onClick={() => setNewGoal({ ...newGoal, color: c })}
                        className="w-8 h-8 rounded-full transition"
                        style={{ backgroundColor: c, boxShadow: newGoal.color === c ? '0 0 0 2px var(--surface), 0 0 0 4px var(--ink)' : 'none' }}></button>
              ))}
            </div>
          </Field>
          <div className="flex gap-2">
            <BtnGhost type="button" onClick={() => { setModal(null); setEditingGoal(null); }} className="flex-1">Annuler</BtnGhost>
            <BtnPrimary type="submit" className="flex-1">{editingGoal ? 'Enregistrer' : 'Créer'}</BtnPrimary>
          </div>
        </form>
      </Sheet>

      <Sheet open={modal === 'newAbo'} onClose={() => setModal(null)} title="Nouvel abonnement">
        <form onSubmit={addAbo} className="space-y-4">
          <TextIn label="Nom" type="text" value={newAbo.nom} onChange={(e) => setNewAbo({ ...newAbo, nom: e.target.value })} placeholder="Ex: Netflix, Spotify…" autoFocus required />
          <Field label="Icône">
            <EmojiPicker value={newAbo.emoji} onChange={(e) => setNewAbo({ ...newAbo, emoji: e })} compact />
          </Field>
          <TextIn label="Montant mensuel (€)" type="number" step="0.01" value={newAbo.montant} onChange={(e) => setNewAbo({ ...newAbo, montant: e.target.value })} placeholder="0,00" required />
          <SelectIn label="Catégorie" value={newAbo.categorie} onChange={(e) => setNewAbo({ ...newAbo, categorie: e.target.value })}>
            {Object.entries(budget.categories).map(([k, c]) => <option key={k} value={k}>{c.icon} {c.nom}</option>)}
            <option value="depense">💸 Autre</option>
          </SelectIn>
          <SelectIn label="Jour de prélèvement" value={newAbo.jour} onChange={(e) => setNewAbo({ ...newAbo, jour: e.target.value })}>
            {Array.from({ length: 31 }, (_, i) => i + 1).map(d => <option key={d} value={d}>Le {d}</option>)}
          </SelectIn>
          <div className="p-3 rounded-[10px] text-[12.5px]"
               style={{ background: 'var(--accent-soft)', color: 'var(--accent)', border: '1px solid var(--accent-soft)' }}>
            🔁 Ajouté automatiquement en dépense chaque mois.
          </div>
          <div className="flex gap-2">
            <BtnGhost type="button" onClick={() => setModal(null)} className="flex-1">Annuler</BtnGhost>
            <BtnPrimary type="submit" className="flex-1">Ajouter</BtnPrimary>
          </div>
        </form>
      </Sheet>

      <Sheet open={modal?.type === 'catDetail'} onClose={() => setModal(null)}
             title={modal?.type === 'catDetail' ? budget.categories[modal.key]?.nom : ''} size="md">
        {modal?.type === 'catDetail' && (() => {
          const cat = budget.categories[modal.key];
          if (!cat) return null;
          const catDeps = depenses.filter(d => d.categorie === modal.key && mk(new Date(d.date)) === currMK);
          const dep = monthlyTotals[modal.key] || 0;
          const pct = cat.budget > 0 ? (dep / cat.budget) * 100 : 0;
          return (
            <div>
              <div className="editorial-card mb-4">
                <div className="flex items-center gap-4 mb-4">
                  <div className="relative">
                    <Ring value={Math.min(pct, 100)} max={100} size={72} stroke={6} color={cat.color} />
                    <div className="absolute inset-0 flex items-center justify-center text-[26px]">{cat.icon}</div>
                  </div>
                  <div>
                    <div className="text-[28px] font-semibold tracking-[-0.025em] num leading-none">{fm(dep)}</div>
                    <div className="text-[12.5px] text-[var(--ink-mute)] mt-1.5 num">sur {fm(cat.budget)}</div>
                  </div>
                </div>
                <div className="flex items-center justify-between text-[13px] pt-3" style={{ borderTop: '1px solid var(--border)' }}>
                  <span className="text-[var(--ink-soft)]">Restant</span>
                  <span className={`font-semibold num ${cat.budget - dep < 0 ? 'text-[var(--negative)]' : ''}`}>{fm(cat.budget - dep)}</span>
                </div>
              </div>
              {catDeps.length === 0 ? (
                <div className="py-8 text-center text-[13px] text-[var(--ink-mute)]">Aucune dépense ce mois-ci</div>
              ) : (
                <div className="space-y-2">
                  <div className="eyebrow mb-2">{catDeps.length} transaction{catDeps.length > 1 ? 's' : ''}</div>
                  {catDeps.map(d => (
                    <div key={d.id} className="flex items-center gap-3 p-3 rounded-[10px]"
                         style={{ background: 'var(--bg-2)', border: '1px solid var(--border)' }}>
                      <div className="w-9 h-9 rounded-[10px] flex items-center justify-center text-[16px] shrink-0"
                           style={{ background: cat.color + '18', border: '1px solid ' + cat.color + '33' }}>{d.emoji || cat.icon}</div>
                      <div className="flex-1 min-w-0">
                        <div className="font-medium text-[13.5px] truncate">{d.description || cat.nom}</div>
                        <div className="text-[11.5px] text-[var(--ink-mute)]">{dateLab(d.date)}</div>
                      </div>
                      <div className="font-semibold text-[14px] num">−{fm(d.montant)}</div>
                    </div>
                  ))}
                </div>
              )}
            </div>
          );
        })()}
      </Sheet>

    </div>
  );
};

const Root = () => <ToastProvider><App /></ToastProvider>;
ReactDOM.createRoot(document.getElementById('root')).render(<Root />);
</script>
</body>
</html>
