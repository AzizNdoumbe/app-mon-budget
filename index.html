     DESIGN TOKENS — light-mode editorial palette

  :root {

    --ink-soft: oklch(0.78 0.01 250);
    --ink-mute: oklch(0.60 0.01 250);

    --border-strong: rgba(148,163,184,0.18);
  }

  * { -webkit-tap-highlight-color: transparent; }
  html, body {

  body {

  ::-webkit-scrollbar-thumb:hover { background: rgba(148,163,184,0.45); }

  /* Safe area */
  @supports (padding: max(0px)) {
    .safe-top { padding-top: max(env(safe-area-inset-top), 0px); }

  }

  /* Animations */
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes slideUp { from { transform: translateY(16px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  @keyframes slideDown { from { transform: translateY(-16px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  @keyframes scaleIn { from { transform: scale(0.96); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
  @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
  @keyframes glow {
    0%,100% { box-shadow: 0 0 20px rgba(139,92,246,0.3); }
    50% { box-shadow: 0 0 40px rgba(139,92,246,0.6); }
  }
  .animate-fade-in { animation: fadeIn .3s ease-out; }
  .animate-slide-up { animation: slideUp .35s cubic-bezier(0.22,1,0.36,1); }
  .animate-slide-down { animation: slideDown .35s cubic-bezier(0.22,1,0.36,1); }
  .animate-scale-in { animation: scaleIn .25s cubic-bezier(0.22,1,0.36,1); }
  .animate-float { animation: float 3s ease-in-out infinite; }

  /* Background atmosphere */
  .bg-atmosphere-light {
    background:
      radial-gradient(at 10% 10%, rgba(139, 92, 246, 0.12) 0, transparent 45%),
      radial-gradient(at 80% 5%, rgba(14, 165, 233, 0.10) 0, transparent 45%),
      radial-gradient(at 50% 90%, rgba(236, 72, 153, 0.08) 0, transparent 45%),

  }
  .bg-atmosphere-dark {
    background:
      radial-gradient(at 10% 10%, rgba(139, 92, 246, 0.15) 0, transparent 45%),
      radial-gradient(at 80% 5%, rgba(14, 165, 233, 0.12) 0, transparent 45%),
      radial-gradient(at 50% 90%, rgba(236, 72, 153, 0.10) 0, transparent 45%),
      #0b0f1a;
  }

  }
  .dark .glass {
    background: rgba(18, 24, 38, 0.7);
    border: 1px solid rgba(148, 163, 184, 0.08);
  }

  .card {
    background: white;
    border: 1px solid rgba(226, 232, 240, 0.8);
    border-radius: 20px;
    transition: border-color .2s ease, transform .2s ease, box-shadow .2s ease;
  }
  .dark .card {
    background: rgba(22, 30, 46, 0.6);
    border: 1px solid rgba(148, 163, 184, 0.1);
  }
  .card-interactive:hover {
    border-color: rgba(139, 92, 246, 0.4);
    transform: translateY(-2px);
    box-shadow: 0 10px 30px -10px rgba(139, 92, 246, 0.2);
  }

  .btn-tap { transition: transform .1s ease; }
  .btn-tap:active { transform: scale(0.97); }

  .progress-ring { transform: rotate(-90deg); transform-origin: center; }

  input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
  input[type=number] { -moz-appearance: textfield; }

  button:focus { outline: none; }
  button:focus-visible { outline: 2px solid rgb(139,92,246); outline-offset: 2px; }

  .nav-link {
    position: relative;
    transition: color .2s ease, background-color .2s ease;
  }
  .nav-link.active::before {
    content: '';
    position: absolute;
    left: 0; top: 50%;
    transform: translateY(-50%);
    width: 3px; height: 60%;
    border-radius: 0 3px 3px 0;
    background: linear-gradient(to bottom, rgb(139,92,246), rgb(14,165,233));
  }

  /* Hide scrollbar but allow scroll */
  .scrollbar-hide::-webkit-scrollbar { display: none; }
  .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }

  /* ============================================================
     DASHBOARD — editorial design (Geist, oklch, ink-blue accent)
     ============================================================ */
  body.editorial { background: var(--bg); color: var(--ink); }
  .editorial-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 18px 20px;
    position: relative;
  }
  .dark .editorial-card { background: rgba(22, 30, 46, 0.6); }

  .eyebrow {
    font-size: 10.5px; letter-spacing: 0.10em;
    text-transform: uppercase; color: var(--ink-mute);
    font-weight: 500; white-space: nowrap;
  }
  .card-title-ed { font-size: 16px; font-weight: 600; letter-spacing: -0.01em; margin: 0; color: var(--ink); }
  .link-more {
    color: var(--ink-mute); text-decoration: none;
    font-size: 12.5px; font-weight: 500;
    display: inline-flex; align-items: center; gap: 4px;
  }
  .link-more:hover { color: var(--ink); }

  /* KPI hero — solde courant (dark fill) */
  .kpi-hero-ed {
    background: var(--ink); color: #fff;
    border: 1px solid var(--ink);
    border-radius: var(--radius-lg);
    padding: 18px 20px 16px;
    position: relative; overflow: hidden;
  }
  .kpi-hero-ed::after {
    content: ""; position: absolute;
    right: -40px; top: -40px;
    width: 180px; height: 180px;
    border-radius: 50%;
    border: 1px solid #ffffff14;
    box-shadow:
      0 0 0 12px transparent, 0 0 0 13px #ffffff10,
      0 0 0 28px transparent, 0 0 0 29px #ffffff0c,
      0 0 0 50px transparent, 0 0 0 51px #ffffff08;
    pointer-events: none;
  }
  .kpi-hero-ed .label { font-size: 10.5px; letter-spacing: 0.10em; text-transform: uppercase; color: #ffffffaa; font-weight: 500; }
  .kpi-hero-ed .val { font-size: 34px; font-weight: 600; letter-spacing: -0.025em; margin: 14px 0 16px; }
  .kpi-hero-ed .val .cur { color: #ffffffaa; font-weight: 500; margin-left: 4px; }
  .kpi-hero-ed .ctas { display: flex; gap: 8px; position: relative; z-index: 1; }
  .btn-ed {
    display: inline-flex; align-items: center; justify-content: center; gap: 6px;
    border-radius: 10px; padding: 9px 12px;
    font-size: 13px; font-weight: 500;
    cursor: pointer; border: 1px solid transparent;
    font-family: inherit; white-space: nowrap;
    transition: background .15s, border-color .15s;
  }
  .btn-light-ed { background: #ffffff18; color: #fff; border: 1px solid #ffffff20; flex: 1; }
  .btn-light-ed:hover { background: #ffffff26; }
  .btn-bright-ed { background: #fff; color: var(--ink); flex: 1; }
  .btn-primary-ed { background: var(--ink); color: #fff; }
  .btn-primary-ed:hover { background: oklch(0.30 0.02 250); }
  .btn-ghost-ed { background: var(--bg-2); border: 1px solid var(--border); color: var(--ink); }
  .btn-ghost-ed:hover { background: oklch(0.94 0.005 80); }

  /* Calendar ribbon (Avant salaire) */
  .ribbon {
    display: grid; grid-template-columns: repeat(30, 1fr);
    gap: 3px; margin-bottom: 14px;
  }
  .ribbon i {
    height: 10px; border-radius: 2px;
    background: var(--bg-2);
    border: 1px solid var(--border);
    display: block;
  }
  .ribbon i.past { background: var(--bg-2); border-color: var(--border); }
  .ribbon i.today { background: var(--ink); border-color: var(--ink); }
  .ribbon i.future { background: var(--surface); border-color: var(--border); }

  .pill-pos {
    display: inline-flex; align-items: center; gap: 4px;
    background: var(--positive-soft); color: var(--positive);
    font-size: 11px; font-weight: 600;
    padding: 3px 7px; border-radius: 999px;
  }
  .pill-neg {
    display: inline-flex; align-items: center; gap: 4px;
    background: var(--negative-soft); color: var(--negative);
    font-size: 11px; font-weight: 600;
    padding: 3px 7px; border-radius: 999px;
  }
  .pulse-tag {
    background: var(--bg-2); border: 1px solid var(--border);
    color: var(--ink-soft);
    font-size: 11px; font-weight: 500;
    padding: 4px 8px; border-radius: 999px;
    display: inline-flex; align-items: center; gap: 6px; white-space: nowrap;
  }
  .pulse-tag .dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--positive);
    box-shadow: 0 0 0 4px oklch(0.55 0.12 155 / 0.15);
  }

  /* Budget item */
  .budget-item-ed {
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 14px 16px;
    background: var(--surface);
    position: relative;
    text-align: left;
    width: 100%;
  }
  .dark .budget-item-ed { background: rgba(22, 30, 46, 0.4); }
  .budget-item-ed.over { border-color: oklch(0.86 0.04 25); }
  .budget-item-ed:hover { border-color: var(--border-strong); }
  .cat-icon-ed {
    width: 36px; height: 36px;
    border-radius: 10px;
    background: var(--bg-2);
    display: grid; place-items: center;
    color: var(--ink);
    position: relative;
    border: 1px solid var(--border);
    flex-shrink: 0;
    font-size: 17px;
  }
  .cat-icon-ed .dot {
    position: absolute;
    bottom: -2px; right: -2px;
    width: 12px; height: 12px;
    border-radius: 50%;
    border: 2px solid var(--surface);
    background: var(--cat-1);
  }
  .progress-ed {
    margin-top: 14px; height: 6px;
    background: var(--bg-2);
    border-radius: 99px; overflow: hidden;
  }
  .progress-ed > i {
    display: block; height: 100%;
    border-radius: 99px;
    background: var(--ink);
  }
  .progress-ed.over > i { background: var(--negative); }
  .progress-ed.ok > i { background: var(--positive); }

  /* Charges segmented strip */
  .charges-seg { display: flex; gap: 3px; margin: 14px 0; }
  .charges-seg i {
    flex: 1; height: 8px; border-radius: 3px;
    background: var(--bg-2); border: 1px solid var(--border);
    display: block;
  }
  .charges-seg i.paid {
    background: var(--positive); border-color: var(--positive);
  }
  .check-ed {
    width: 18px; height: 18px;
    border-radius: 6px;
    border: 1.5px solid var(--border-strong);
    display: grid; place-items: center;
    flex-shrink: 0;
    background: var(--surface); color: transparent;
    cursor: pointer;
  }
  .check-ed.on { background: var(--positive); border-color: var(--positive); color: #fff; }

  /* Dashed top divider on chart card */
  .editorial-card.chart-card-ed::before {
    content: ""; position: absolute;
    left: 22px; right: 22px; top: 0; height: 1px;
    background-image: linear-gradient(to right, var(--border-strong) 50%, transparent 50%);
    background-size: 6px 1px;
  }

  /* Tx row */
  .tx-row {
    display: grid; grid-template-columns: 36px 1fr auto;
    gap: 12px; align-items: center;
    padding: 11px 0;
    border-top: 1px solid var(--border);
  }
  .tx-row:first-child { border-top: none; }
  .tx-ic {
    width: 36px; height: 36px; border-radius: 10px;
    background: var(--bg-2); color: var(--ink);
    display: grid; place-items: center;
    font-size: 17px; border: 1px solid var(--border);
    flex-shrink: 0;
  }
</style>
</head>

const fm = (amount, opts = {}) => {
  const { compact = false, hideZero = false, forceSign = false } = opts;
  if (hideZero && !amount) return '—';
  const sign = forceSign && amount > 0 ? '+' : '';
  if (compact && Math.abs(amount) >= 1000) {
    return sign + new Intl.NumberFormat('fr-FR', { style: 'currency', currency: 'EUR', notation: 'compact', maximumFractionDigits: 1 }).format(amount);
  }
  return sign + new Intl.NumberFormat('fr-FR', { style: 'currency', currency: 'EUR', minimumFractionDigits: 2, maximumFractionDigits: 2 }).format(amount);
};
const pa = (v) => { if (!v) return 0; const n = parseFloat(String(v).replace(',', '.').replace(/\s/g, '')); return isNaN(n) ? 0 : n; };
const mk = (d = new Date()) => `${d.getFullYear()}-${d.getMonth()}`;
/* Salary-period key — period is anchored to salary day, not the 1st */
const spk = (d = new Date(), salaryDay = 24) => {
  const day = d.getDate();
  let y = d.getFullYear(), m = d.getMonth();
  if (day < salaryDay) { m -= 1; if (m < 0) { m = 11; y -= 1; } }
  return `${y}-${m}`;
};
/* Position of a calendar day relative to the start of a salary period (0 = salary day, increases through the period) */
const dayPos = (day, salaryDay = 24) => ((day - salaryDay + 31) % 31);
const mName = (k) => { const [y, m] = k.split('-').map(Number); return new Date(y, m).toLocaleDateString('fr-FR', { month: 'long', year: 'numeric' }); };
const mShort = (k) => { const [y, m] = k.split('-').map(Number); return new Date(y, m).toLocaleDateString('fr-FR', { month: 'short' }); };
const dateLab = (d) => {
  const date = new Date(d);
  const today = new Date(); today.setHours(0, 0, 0, 0);
  const yest = new Date(today); yest.setDate(yest.getDate() - 1);
  if (date.toDateString() === today.toDateString()) return "Aujourd'hui";
  if (date.toDateString() === yest.toDateString()) return 'Hier';
  return date.toLocaleDateString('fr-FR', { weekday: 'short', day: 'numeric', month: 'short' });
};

  let score = 100;

  // 1. Budget overspend per category
  Object.entries(categories).forEach(([k, c]) => {
    const d = monthlyTotals[k] || 0;
    if (c.budget > 0 && d > c.budget) {
      const excess = d - c.budget;
      const pct = (excess / c.budget) * 100;
      insights.push({
        severity: pct > 50 ? 'high' : 'med',
        emoji: '🚨',
        title: `Budget ${c.nom} dépassé`,
        detail: `+${excess.toLocaleString('fr-FR', { style: 'currency', currency: 'EUR', maximumFractionDigits: 0 })} au-dessus (${pct.toFixed(0)}%)`
      });
      score -= Math.min(15, pct / 5);
    }
  });

  // Current calendar-month transactions
  const monthDeps = depenses.filter(d => mk(new Date(d.date)) === currPeriod);

  // 2. Delivery orders pattern (Uber Eats, Deliveroo, etc.)
  const delivPat = /uber.?eat|deliveroo|just.?eat|frichti|tiptoque|livraison|lieferando|foodora|wolt|glovo/i;
  const delivery = monthDeps.filter(d => delivPat.test(d.description || ''));
  if (delivery.length >= 3) {
    const total = delivery.reduce((s, d) => s + (parseFloat(String(d.montant).replace(',','.')) || 0), 0);
    insights.push({
      severity: delivery.length >= 7 ? 'high' : 'med',
      emoji: '🍔',
      title: `${delivery.length} commandes livraison ce mois-ci`,
      detail: `${total.toFixed(0)}€ cumulés — un vrai budget caché`
    });
    score -= delivery.length * 2;
  }

  // 3. Small lunch / café pattern
  const lunchPat = /midi|dej|déjeuner|sandwich|café|coffee|snack|kebab|boulang|starbucks|paul/i;
  const lunches = monthDeps.filter(d => lunchPat.test(d.description || '') && parseFloat(String(d.montant).replace(',','.')) < 15);
  if (lunches.length >= 5) {
    const total = lunches.reduce((s, d) => s + (parseFloat(String(d.montant).replace(',','.')) || 0), 0);
    insights.push({
      severity: 'med',
      emoji: '☕',
      title: `${lunches.length} petits achats du midi`,
      detail: `${total.toFixed(0)}€ — préparer ses repas ferait économiser ici`
    });
    score -= lunches.length;
  }

  // 4. Same-day multi-purchase days (impulsive shopping)
  const byDay = {};
  monthDeps.forEach(d => { byDay[d.date] = (byDay[d.date] || 0) + 1; });
  const bingeDays = Object.values(byDay).filter(c => c >= 4).length;
  if (bingeDays >= 2) {
    insights.push({
      severity: 'low',
      emoji: '🛍️',
      title: `${bingeDays} journées avec plusieurs achats`,
      detail: `Pattern d'achats compulsifs à surveiller`
    });
    score -= bingeDays * 3;
  }

  // 5. Repeated same-description (recurring pattern)
  const descCount = {};
  monthDeps.forEach(d => {
    const desc = (d.description || '').toLowerCase().trim().replace(/[\W_]+/g, ' ').trim();
    if (desc.length > 2) descCount[desc] = (descCount[desc] || 0) + 1;
  });
  Object.entries(descCount).filter(([, c]) => c >= 4).forEach(([desc, count]) => {
    insights.push({
      severity: 'low',
      emoji: '🔁',
      title: `"${desc.charAt(0).toUpperCase() + desc.slice(1)}" × ${count}`,
      detail: `Dépense récurrente non déclarée comme abonnement`
    });
    score -= 2;
  });

  // 6. Micro-purchases (<5€) frequency
  const micro = monthDeps.filter(d => {
    const m = parseFloat(String(d.montant).replace(',','.'));
    return m > 0 && m < 5;
  });
  if (micro.length >= 10) {
    const total = micro.reduce((s, d) => s + (parseFloat(String(d.montant).replace(',','.')) || 0), 0);
    insights.push({
      severity: 'med',
      emoji: '🪙',
      title: `${micro.length} micro-dépenses (< 5€)`,
      detail: `${total.toFixed(0)}€ grignotés — regroupez vos achats`
    });
    score -= micro.length * 0.8;
  }

  // 7. Exceptional expenses frequency
  const exc = monthDeps.filter(d => d.categorie === 'exceptionnel');
  if (exc.length >= 3) {
    insights.push({
      severity: 'high',
      emoji: '⚠️',
      title: `${exc.length} charges exceptionnelles`,
      detail: `Des imprévus à répétition = passer en charges fixes`
    });
    score -= exc.length * 3;
  }

  // 8. Reste à vivre health
  if (resteAVivre > 0 && totalDepense > resteAVivre) {
    insights.push({
      severity: 'high',
      emoji: '📉',
      title: 'Dépassement du reste à vivre',
      detail: `${(totalDepense - resteAVivre).toFixed(0)}€ de plus que prévu`
    });
    score -= 20;
  }

  // 9. Positive insight
  if (insights.length === 0 && monthDeps.length >= 3) {
    insights.push({
      severity: 'good',
      emoji: '✨',
      title: 'Excellent équilibre',
      detail: 'Aucun pattern inquiétant détecté ce mois-ci'
    });
  }
  if (insights.length <= 1 && monthDeps.length >= 8) {
    insights.push({
      severity: 'good',
      emoji: '🏆',
      title: 'Discipline budgétaire',
      detail: `${monthDeps.length} dépenses suivies, budget maîtrisé`
    });
  }

  score = Math.max(0, Math.min(100, Math.round(score)));
  const level = score > 75 ? 'Excellent' : score > 50 ? 'Bon' : score > 25 ? 'Attention' : 'Critique';
  return { score, level, insights };
};

/* Normalize string for goal/category matching */
const normStr = (s) => (s || '').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '').replace(/[\W_]+/g, ' ').trim();

const ToastCtx = createContext({ push: () => {} });

const ToastProvider = ({ children }) => {
  const [toasts, setToasts] = useState([]);
  const push = useCallback((msg, type = 'info') => {
    const id = Date.now() + Math.random();
    setToasts(t => [...t, { id, msg, type }]);
    setTimeout(() => setToasts(t => t.filter(x => x.id !== id)), 2800);
  }, []);
  return (
    <ToastCtx.Provider value={{ push }}>
      {children}
      <div className="fixed top-4 right-4 z-[100] space-y-2 pointer-events-none max-w-sm">
        {toasts.map(t => {
          const styleMap = {
            success: { background: 'var(--positive)', color: '#fff' },
            error: { background: 'var(--negative)', color: '#fff' },
            warn: { background: 'oklch(0.62 0.14 75)', color: '#fff' },

          return (
            <div key={t.id}

const EmojiPicker = ({ value, onChange, compact = false }) => {
  const [cat, setCat] = useState(Object.keys(EMOJI_LIBRARY)[0]);
  const [query, setQuery] = useState('');
  const filtered = useMemo(() => {
    const q = normStr(query);
    if (!q) return EMOJI_LIBRARY[cat];
    const all = [...new Set(Object.values(EMOJI_LIBRARY).flat())];
    const scored = [];
    all.forEach(e => {
      const kw = normStr(EMOJI_KEYWORDS[e] || '');
      if (!kw) return;
      const tokens = kw.split(' ');
      let score = 0;
      if (tokens.some(t => t === q)) score = 3;
      else if (tokens.some(t => t.startsWith(q))) score = 2;
      else if (kw.includes(q)) score = 1;
      if (score) scored.push({ e, score });
    });
    return scored.sort((a, b) => b.score - a.score).map(x => x.e);
  }, [query, cat]);

    <div className="space-y-2">

const Ring = ({ value, max, size = 72, stroke = 6, color = 'oklch(0.30 0.07 245)' }) => {
  const pct = Math.max(0, Math.min(100, (value / max) * 100));
  const r = (size - stroke) / 2;
  const c = 2 * Math.PI * r;
  return (
    <svg width={size} height={size} className="progress-ring">
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="oklch(0.94 0.01 80)" strokeWidth={stroke} />
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={stroke}
              strokeDasharray={c} strokeDashoffset={c * (1 - pct / 100)} strokeLinecap="round"
              style={{ transition: 'stroke-dashoffset .6s cubic-bezier(.22,1,.36,1)' }} />
    </svg>
  );
};

  /* ---- Auth ---- */
  useEffect(() => {
    const unsub = auth.onAuthStateChanged(async (u) => {
      setUser(u);
      if (u) {
        const local = localStorage.getItem('budgetTrackerData');
        if (local) {
          try {
            const doc = await db.collection('users').doc(u.uid).collection('data').doc('budget').get();
            if (!doc.exists) await db.collection('users').doc(u.uid).collection('data').doc('budget').set(JSON.parse(local));
          } catch(e) { console.error(e); }
        }
      }
      setLoading(false);
    });
    return () => unsub();
  }, []);

  /* ---- Firestore sub ---- */
  useEffect(() => {
    if (!user) return;
    const unsub = db.collection('users').doc(user.uid).collection('data').doc('budget').onSnapshot((doc) => {
      if (!doc.exists) return;
      const d = doc.data();
      initialRef.current = true;
      setSoldeCompte(d.soldeCompte || 0);
      setSoldePEA(d.soldePEA || 0);
      setSoldeCrypto(d.soldeCrypto || 0);
      setDepenses(d.depenses || []);
      setStatsArch(d.statsArchivees || {});
      setChargesFixes(d.chargesFixesAuto || []);
      setChargesPayees(d.chargesPayees || {});
      setObjectifs(d.objectifs || []);
      setAbos(d.abonnements || []);
      if (d.darkMode !== undefined) setDarkMode(d.darkMode);
      setHideBalances(d.hideBalances || false);
      setInvestUpdates(d.investUpdates || { pea: null, crypto: null });
      // Migrate legacy shape (number → { base, since }) so new versements add on top
      const rawIT = d.investTotal || { pea: null, crypto: null };
      const normIT = {};
      ['pea', 'crypto'].forEach(k => {
        const v = rawIT[k];
        if (v == null) normIT[k] = null;
        else if (typeof v === 'number') normIT[k] = { base: v, since: new Date().toISOString() };
        else if (typeof v === 'object' && typeof v.base === 'number') normIT[k] = v;
        else normIT[k] = null;
      });
      setInvestTotal(normIT);
      if (d.monthlyBudget) {
        const m = {};
        Object.entries(d.monthlyBudget.categories || {}).forEach(([k, c]) => {
          m[k] = { ...c, showInDashboard: c.showInDashboard !== false, icon: c.icon || '📊' };
        });
        setBudget({ ...DEFAULT_BUDGET, ...d.monthlyBudget, categories: m });
      }
      setTimeout(() => { initialRef.current = false; }, 200);
    });
    return () => unsub();
  }, [user]);

  /* ---- Save ---- */
  useEffect(() => {
    if (!user || initialRef.current) return;
    if (saveRef.current) clearTimeout(saveRef.current);
    saveRef.current = setTimeout(() => {
      setSyncing(true);
      db.collection('users').doc(user.uid).collection('data').doc('budget').set({
        soldeCompte, soldePEA, soldeCrypto, depenses, statsArchivees: statsArch,
        chargesFixesAuto: chargesFixes, chargesPayees, objectifs, abonnements: abos,
        monthlyBudget: budget, darkMode, hideBalances, investUpdates, investTotal,
        lastUpdate: firebase.firestore.FieldValue.serverTimestamp()
      }, { merge: true }).then(() => setSyncing(false)).catch(() => setSyncing(false));
    }, 800);
    return () => clearTimeout(saveRef.current);
  }, [user, soldeCompte, soldePEA, soldeCrypto, depenses, statsArch, chargesFixes, chargesPayees, objectifs, abos, budget, darkMode, hideBalances, investUpdates, investTotal]);

  /* ---- Dark mode ---- */
  useEffect(() => {
    document.documentElement.classList.toggle('dark', darkMode);
    const meta = document.querySelector('meta[name="theme-color"]');
    if (meta) meta.content = darkMode ? '#0b0f1a' : '#f7f8fc';
  }, [darkMode]);

  /* ---- Archive on calendar-month change ---- */
  useEffect(() => {
    const check = () => {
      const now = new Date();
      const curr = mk(now);
      const last = localStorage.getItem('lastMonthChecked');
      if (last && last !== curr) {
        const [ly, lm] = last.split('-').map(Number);
        const t = {};
        Object.keys(budget.categories).forEach(k => t[k] = 0);
        t.exceptionnel = 0; t.depense = 0;
        depenses.forEach(d => {
          if (mk(new Date(d.date)) === last) t[d.categorie] = (t[d.categorie] || 0) + pa(d.montant);
        });
        const total = Object.values(t).reduce((s, v) => s + v, 0);
        setStatsArch(p => ({ ...p, [last]: { depenses: t, total, date: new Date(ly, lm, 1) } }));
      }
      localStorage.setItem('lastMonthChecked', curr);
    };
    check();
    const i = setInterval(check, 3600000);
    return () => clearInterval(i);
  }, [depenses, budget.categories]);

  /* ---- Auto-process subscriptions ---- */
  useEffect(() => {
    const now = new Date();
    const today = now.getDate();
    const k = mk(now);
    const processed = JSON.parse(localStorage.getItem('abosProcessed') || '{}');
    const pTM = processed[k] || [];
    const newP = [...pTM];
    let changed = false;
    abos.forEach(a => {
      if (a.jour <= today && !pTM.includes(a.id)) {
        const exists = depenses.some(d => d.aboId === a.id && mk(new Date(d.date)) === k);
        if (!exists) {
          const m = pa(a.montant);
          setDepenses(prev => [{
            id: Date.now() + Math.random(),
            categorie: a.categorie, montant: m,
            description: `${a.emoji || '🔁'} ${a.nom}`,
            date: new Date(now.getFullYear(), now.getMonth(), a.jour).toISOString().split('T')[0],
            deduireDuSolde: true, aboId: a.id,
          }, ...prev]);
          setSoldeCompte(s => s - m);
          newP.push(a.id);
          changed = true;
        }
      }
    });
    if (changed) {
      processed[k] = newP;
      localStorage.setItem('abosProcessed', JSON.stringify(processed));
    }
  }, [abos]);

  /* ---- Derived ---- */
  const salaryDay = budget.jourPaiementSalaire || 24;
  const currMK = mk(new Date());
  /* Charges-period anchor: ISO date of the last Salaire revenu (fallback: most recent jourPaiementSalaire occurrence) */
  const salaryAnchorDate = useMemo(() => {
    if (budget.lastSalaireDate) return new Date(budget.lastSalaireDate);
    const sd = budget.jourPaiementSalaire || 24;
    const today = new Date();
    let d = new Date(today.getFullYear(), today.getMonth(), sd);
    if (d > today) d = new Date(today.getFullYear(), today.getMonth() - 1, sd);
    return d;
  }, [budget.lastSalaireDate, budget.jourPaiementSalaire]);
  const chargesPeriodKey = useMemo(() => {
    const d = salaryAnchorDate;
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  }, [salaryAnchorDate]);
  const anchorSalaryDay = salaryAnchorDate.getDate();

  /* Monthly totals: calendar month (auto-reset day 1) */
  const monthlyTotals = useMemo(() => {
    const t = {};
    Object.keys(budget.categories).forEach(k => t[k] = 0);
    t.exceptionnel = 0; t.depense = 0;
    depenses.forEach(d => {
      if (mk(new Date(d.date)) === currMK) t[d.categorie] = (t[d.categorie] || 0) + pa(d.montant);
    });
    return t;
  }, [depenses, budget.categories, currMK]);

  const totalDepense = useMemo(() => Object.values(monthlyTotals).reduce((s, v) => s + v, 0), [monthlyTotals]);
  const chargesPayeesM = useMemo(() => chargesFixes.filter(c => chargesPayees[chargesPeriodKey]?.[c.id]).reduce((s, c) => s + pa(c.montant), 0), [chargesFixes, chargesPayees, chargesPeriodKey]);
  /* "Charges restantes" = scheduled after the salary anchor and not yet paid (i.e. coming in the days after salary was added) */
  const chargesNonPayeesM = useMemo(() => chargesFixes
    .filter(c => !chargesPayees[chargesPeriodKey]?.[c.id])
    .reduce((s, c) => s + pa(c.montant), 0), [chargesFixes, chargesPayees, chargesPeriodKey]);
  const totalChargesF = budget.chargesfixes + chargesPayeesM + chargesNonPayeesM;
  const resteAVivre = budget.revenus - totalChargesF;

  const soldePrev = useMemo(() => ({
    restantes: chargesNonPayeesM,
    solde: soldeCompte - chargesNonPayeesM
  }), [chargesNonPayeesM, soldeCompte]);

  /* Notifs = charges due (scheduled day has been reached since salary anchor) and not yet paid */
  const notifs = useMemo(() => {
    const today = new Date().getDate();
    const todayPos = dayPos(today, anchorSalaryDay);
    return chargesFixes
      .filter(c => !chargesPayees[chargesPeriodKey]?.[c.id] && dayPos(c.jourPaiement, anchorSalaryDay) <= todayPos)
      .map(c => ({ ...c, daysLate: todayPos - dayPos(c.jourPaiement, anchorSalaryDay) }));
  }, [chargesFixes, chargesPayees, chargesPeriodKey, anchorSalaryDay]);

  const budgetHealth = useMemo(() => analyzeBudget({
    depenses, monthlyTotals, categories: budget.categories, resteAVivre, totalDepense, salaryDay
  }), [depenses, monthlyTotals, budget.categories, resteAVivre, totalDepense, salaryDay]);
  const healthScore = budgetHealth.score;

  const totalPatrimoine = soldeCompte + soldePEA + soldeCrypto + objectifs.reduce((s, g) => s + (g.actuel || 0), 0);

  /* ---- Actions ---- */
  const findLinkedGoalId = (catKey) => {
    const cat = budget.categories[catKey];
    if (!cat) return null;
    const g = objectifs.find(o => normStr(o.nom) === normStr(cat.nom));
    return g ? g.id : null;
  };
  const addDepense = (e) => {
    e?.preventDefault();
    if (!newDepense.montant) return;
    const m = pa(newDepense.montant);
    const linkedGoalId = findLinkedGoalId(newDepense.categorie);
    setDepenses(p => [{ id: Date.now(), ...newDepense, montant: m, linkedGoalId }, ...p]);
    if (newDepense.deduireDuSolde) setSoldeCompte(s => s - m);
    if (linkedGoalId) {
      setObjectifs(p => p.map(g => g.id === linkedGoalId ? { ...g, actuel: (g.actuel || 0) + m } : g));
      const gn = objectifs.find(o => o.id === linkedGoalId);
      toast(`+${fm(m)} ajouté à "${gn?.nom}"`, 'success');
    } else {
      toast('Dépense ajoutée', 'success');
    }
    setNewDepense({ categorie: newDepense.categorie, montant: '', description: '', emoji: '', date: new Date().toISOString().split('T')[0], deduireDuSolde: true });
    setModal(null);
  };
  const deleteDepense = (id) => {
    const d = depenses.find(x => x.id === id);
    if (!d) return;
    if (d.deduireDuSolde !== false) setSoldeCompte(s => s + pa(d.montant));
    if (d.linkedGoalId) {
      setObjectifs(p => p.map(g => g.id === d.linkedGoalId ? { ...g, actuel: Math.max(0, (g.actuel || 0) - pa(d.montant)) } : g));
    }
    setDepenses(p => p.filter(x => x.id !== id));
    toast('Dépense supprimée');
  };
  const addCharge = (e) => {
    e?.preventDefault();
    if (!newCharge.nom || !newCharge.montant) return;
    setChargesFixes(p => [...p, { id: Date.now(), nom: newCharge.nom, montant: pa(newCharge.montant), jourPaiement: parseInt(newCharge.jourPaiement) }]);
    setNewCharge({ nom: '', montant: '', jourPaiement: 1 });
    setModal('charges');
    toast('Charge ajoutée', 'success');
  };
  /* Pay/unpay a charge — updates amount if changed, toggles paid state, mirrors a depense entry in history */
  const toggleCharge = (id, overrideAmount = null) => {
    const c = chargesFixes.find(x => x.id === id);
    if (!c) return;
    const was = chargesPayees[chargesPeriodKey]?.[id];
    const m = overrideAmount != null ? pa(overrideAmount) : pa(c.montant);
    if (!was && overrideAmount != null && m !== pa(c.montant)) {
      setChargesFixes(p => p.map(x => x.id === id ? { ...x, montant: m } : x));
    }
    setChargesPayees(p => ({ ...p, [chargesPeriodKey]: { ...(p[chargesPeriodKey] || {}), [id]: !was } }));
    if (was) {
      setSoldeCompte(s => s + pa(c.montant));
      setDepenses(p => p.filter(d => !(d.chargeId === id && d.chargePeriod === chargesPeriodKey)));
    } else {
      setSoldeCompte(s => s - m);
      setDepenses(p => [{
        id: Date.now() + Math.random(),
        categorie: 'depense',
        montant: m,
        description: `🔁 ${c.nom}`,
        emoji: '🔁',
        date: new Date().toISOString().split('T')[0],
        deduireDuSolde: false,
        chargeId: id,
        chargePeriod: chargesPeriodKey,
      }, ...p]);
    }
  };
  const addRevenu = (e) => {
    e?.preventDefault();
    if (!newRevenu.montant) return;
    setSoldeCompte(s => s + pa(newRevenu.montant));
    if (newRevenu.type === 'Salaire') {
      const today = new Date().toISOString().split('T')[0];
      /* Setting lastSalaireDate rotates the chargesPeriodKey, so all charges become unchecked for the new period */
      setBudget(b => ({ ...b, lastSalaireDate: today }));
      toast('Salaire ajouté — charges réinitialisées', 'success');
    } else {
      toast('Revenu ajouté', 'success');
    }
    setNewRevenu({ type: 'Salaire', montant: '' });
    setModal(null);
  };
  const addGoal = (e) => {
    e?.preventDefault();
    if (!newGoal.nom || !newGoal.cible) return;
    if (editingGoal) setObjectifs(p => p.map(g => g.id === editingGoal ? { ...g, ...newGoal, cible: pa(newGoal.cible), actuel: pa(newGoal.actuel) } : g));
    else setObjectifs(p => [...p, { id: Date.now(), ...newGoal, cible: pa(newGoal.cible), actuel: pa(newGoal.actuel) || 0, createdAt: Date.now() }]);
    setNewGoal({ nom: '', cible: '', actuel: '', deadline: '', color: '#8b5cf6', emoji: '🎯' });
    setEditingGoal(null);
    setModal(null);
    toast(editingGoal ? 'Objectif modifié' : 'Objectif créé', 'success');
  };
  const addAbo = (e) => {
    e?.preventDefault();
    if (!newAbo.nom || !newAbo.montant) return;
    setAbos(p => [...p, { id: Date.now(), ...newAbo, montant: pa(newAbo.montant), jour: parseInt(newAbo.jour) }]);
    setNewAbo({ nom: '', montant: '', categorie: 'perso', jour: 1, emoji: '🔁' });
    setModal('settings');
    toast('Abonnement ajouté', 'success');
  };
  const exportCSV = () => {
    const rows = [['Date', 'Catégorie', 'Description', 'Montant']];
    depenses.forEach(d => {
      const cat = d.categorie === 'exceptionnel' ? 'Exceptionnel' : d.categorie === 'depense' ? 'Autre' : (budget.categories[d.categorie]?.nom || d.categorie);
      rows.push([d.date, cat, (d.description || '').replace(/"/g, '""'), String(d.montant).replace('.', ',')]);
    });
    const csv = '\uFEFF' + rows.map(r => r.map(c => `"${c}"`).join(';')).join('\n');
    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = `budget-${new Date().toISOString().split('T')[0]}.csv`; a.click();
    URL.revokeObjectURL(url);
    toast('Export téléchargé', 'success');
  };
  const signInWithGoogle = async () => {
    const p = new firebase.auth.GoogleAuthProvider();
    p.setCustomParameters({ prompt: 'select_account' });
    try { await auth.signInWithPopup(p); } catch { toast('Erreur de connexion', 'error'); }
  };
  const signOut = () => auth.signOut();

  /* ============================================================
     LOADING / LOGIN
     ============================================================ */
  if (loading) {
    return (
      <div className="min-h-screen flex items-center justify-center" style={{ background: 'var(--bg)' }}>
        <div className="text-center">
          <div className="w-16 h-16 mx-auto rounded-[14px] flex items-center justify-center text-white text-[28px] mb-4 animate-float font-semibold"
               style={{ background: 'var(--ink)' }}>€</div>
          <div className="flex gap-1.5 justify-center">
            {[0,1,2].map(i => <div key={i} className="w-1.5 h-1.5 rounded-full animate-pulse" style={{ background: 'var(--ink)', animationDelay: `${i * 150}ms` }}></div>)}
          </div>
        </div>
      </div>
    );
  }

  if (!user) {
    return (
      <div className="min-h-screen flex items-center justify-center p-6" style={{ background: 'var(--bg)' }}>
        <div className="w-full max-w-5xl grid lg:grid-cols-2 gap-12 items-center">
          <div className="text-center lg:text-left">
            <div className="inline-flex w-16 h-16 rounded-[14px] items-center justify-center text-white text-[28px] font-semibold mb-6 animate-float"
                 style={{ background: 'var(--ink)' }}>€</div>
            <div className="eyebrow mb-2">Mon Budget</div>
            <h1 className="text-[40px] lg:text-[52px] font-semibold mb-4 tracking-[-0.025em] leading-[1.05]" style={{ color: 'var(--ink)' }}>
              Pilotez votre budget<br/>
              <span style={{ color: 'var(--accent)' }}>en temps réel.</span>
            </h1>
            <p className="text-[15px] text-[var(--ink-soft)] max-w-md mx-auto lg:mx-0 mb-8">
              Dépenses, épargne, investissements, abonnements — tout ce qu'il faut pour garder le contrôle.
            </p>
            <div className="hidden lg:grid grid-cols-3 gap-3 max-w-lg">
              {[
                { e: '🎯', t: 'Objectifs d\'épargne' },
                { e: '📈', t: 'Projections PEA' },
                { e: '🔁', t: 'Abonnements auto' },
                { e: '📊', t: 'Stats avancées' },
                { e: '🔒', t: 'Données sécurisées' },
                { e: '⚡', t: 'Sync temps réel' },
              ].map((f, i) => (
                <div key={i} className="editorial-card text-center" style={{ padding: '12px' }}>
                  <div className="text-[20px] mb-1">{f.e}</div>
                  <div className="text-[11px] font-medium">{f.t}</div>
                </div>
              ))}
            </div>
          </div>

          <div className="editorial-card" style={{ padding: 28 }}>
            <div className="eyebrow mb-1.5">Authentification</div>
            <h2 className="text-[22px] font-semibold tracking-[-0.02em] mb-1.5">Connexion</h2>
            <p className="text-[13px] text-[var(--ink-soft)] mb-5">Continuez avec votre compte Google.</p>
            <button onClick={signInWithGoogle} className="w-full flex items-center justify-center gap-3 px-5 py-3 rounded-[10px] btn-tap font-medium text-[14px] transition"
                    style={{ background: 'var(--surface)', border: '1px solid var(--border-strong)', color: 'var(--ink)' }}>
              <svg width="18" height="18" viewBox="0 0 24 24">
                <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
              </svg>
              <span>Continuer avec Google</span>
            </button>
            <div className="mt-5 text-center text-[11.5px] text-[var(--ink-mute)]">
              Vos données restent privées et synchronisées entre vos appareils.
            </div>
          </div>
        </div>
      </div>
    );
  }

  /* ============================================================
     VIEWS
     ============================================================ */

  const Amount = ({ v, cn = '', compact = false, forceSign = false }) => (
    <span className={cn}>{hideBalances ? '••••' : fm(v, { compact, forceSign })}</span>
  );

  /* ─────── DASHBOARD ─────── */
  const DashboardView = () => {
    const cats = Object.entries(budget.categories).filter(([, c]) => c.showInDashboard !== false)
      .sort(([ka], [kb]) => (monthlyTotals[kb] || 0) - (monthlyTotals[ka] || 0));

    const recentDepenses = [...depenses].sort((a, b) => new Date(b.date) - new Date(a.date)).slice(0, 6);

    // Mini trend chart
    const chartRef = useRef(null);
    const chartInst = useRef(null);
    const trendData = useMemo(() => {
      const months = [];
      const now = new Date();
      for (let i = 5; i >= 0; i--) {
        const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
        const y = d.getFullYear(), m = d.getMonth();
        let total = 0;
        depenses.forEach(dep => {
          const dd = new Date(dep.date);
          if (dd.getFullYear() === y && dd.getMonth() === m) total += pa(dep.montant);
        });
        months.push({ label: d.toLocaleDateString('fr-FR', { month: 'short' }), total });
      }
      return months;
    }, [depenses]);

    /* Bars + dashed 3-month rolling-average trend, ink-blue editorial palette */
    const rollingAvg = useMemo(() => trendData.map((_, i) => {
      const slice = trendData.slice(Math.max(0, i - 2), i + 1);
      return slice.reduce((s, x) => s + x.total, 0) / slice.length;
    }), [trendData]);
    const avgTotal = useMemo(() => trendData.reduce((s, x) => s + x.total, 0) / Math.max(1, trendData.length), [trendData]);

    useEffect(() => {
      if (!chartRef.current) return;
      if (chartInst.current) chartInst.current.destroy();
      const ctx = chartRef.current.getContext('2d');
      const inkColor = darkMode ? '#e2e8f0' : 'oklch(0.22 0.02 250)';
      const accentColor = darkMode ? '#94a3b8' : 'oklch(0.30 0.07 245)';
      const gridColor = darkMode ? 'rgba(148,163,184,.08)' : 'oklch(0.93 0.004 80)';
      const tickColor = darkMode ? '#94a3b8' : 'oklch(0.60 0.01 250)';
      chartInst.current = new Chart(ctx, {
        type: 'bar',
        data: {
          labels: trendData.map(d => d.label),
          datasets: [
            {
              type: 'bar',
              label: 'Dépenses',
              data: trendData.map(d => d.total),
              backgroundColor: inkColor,
              borderRadius: 4,
              barThickness: 32,
            },
            {
              type: 'line',
              label: 'Tendance 3 mois',
              data: rollingAvg,
              borderColor: accentColor,
              borderDash: [4, 4],
              borderWidth: 1.6,
              pointRadius: 2.5,
              pointBackgroundColor: accentColor,
              pointBorderColor: accentColor,
              tension: 0,
              fill: false,
            }
          ]
        },
        options: {
          responsive: true, maintainAspectRatio: false,
          plugins: { legend: { display: false }, tooltip: { callbacks: { label: (c) => `${c.dataset.label}: ${fm(c.parsed.y)}` } } },
          scales: {
            y: { beginAtZero: true, grid: { color: gridColor, drawBorder: false }, ticks: { color: tickColor, font: { family: 'Geist Mono, ui-monospace', size: 11 }, callback: v => fm(v, { compact: true }) } },
            x: { grid: { display: false }, ticks: { color: tickColor, font: { family: 'Geist, sans-serif', size: 11.5 } } }
          }
        }
      });
      return () => chartInst.current?.destroy();
    }, [trendData, rollingAvg, darkMode]);

    /* Avant-salaire calendar ribbon: 30 days starting at salaryAnchorDate */
    const ribbon = useMemo(() => {
      const days = [];
      const today = new Date(); today.setHours(0,0,0,0);
      const anchor = new Date(salaryAnchorDate); anchor.setHours(0,0,0,0);
      const elapsed = Math.max(0, Math.floor((today - anchor) / 86400000));
      for (let i = 0; i < 30; i++) {
        if (i < elapsed) days.push('past');
        else if (i === elapsed) days.push('today');
        else days.push('future');
      }
      return { days, elapsed };
    }, [salaryAnchorDate]);
    const daysToSalary = Math.max(0, 30 - ribbon.elapsed);

    /* Trend pill on chart */
    const trendDelta = useMemo(() => {
      if (trendData.length < 2) return null;
      const last = trendData[trendData.length - 1].total;
      const prev = trendData[trendData.length - 2].total;
      if (!prev) return null;
      return ((last - prev) / prev) * 100;
    }, [trendData]);

    return (
      <div className="space-y-5 animate-fade-in">
        {/* ========== KPI ROW ========== */}
        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-[18px]">
          {/* Hero solde — dark fill with topographic decoration */}
          <div className="kpi-hero-ed">
            <div className="flex items-center justify-between">
              <div className="label">Solde courant</div>
            </div>
            <div className="val num"><Amount v={soldeCompte} /></div>
            <div className="ctas">
              <button type="button"
                      onClick={() => {
                        const v = prompt('Nouveau solde :', soldeCompte.toFixed(2));
                        if (v !== null) { const n = parseFloat(v.replace(',','.')); if (!isNaN(n)) setSoldeCompte(n); }
                      }}
                      className="btn-ed btn-light-ed">Modifier</button>
              <button type="button" onClick={() => setModal('revenu')} className="btn-ed btn-bright-ed">
                <I.Plus s={13} sw={2}/> Revenu
              </button>
            </div>
          </div>

          {/* Avant salaire — calendar ribbon */}
          <div className="editorial-card">
            <div className="flex items-start justify-between mb-2.5">
              <div className="eyebrow">Avant salaire</div>
              <div className="text-[11px] num text-[var(--ink-mute)] whitespace-nowrap">J−{daysToSalary}</div>
            </div>
            <div className="ribbon">
              {ribbon.days.map((cls, i) => <i key={i} className={cls}></i>)}
            </div>
            <div className={`text-[30px] leading-none font-semibold tracking-tight num ${soldePrev.solde < 0 ? 'text-[var(--negative)]' : ''}`}>
              <Amount v={soldePrev.solde} />
            </div>
            <div className="text-[12.5px] text-[var(--ink-soft)] mt-1.5">
              {soldePrev.restantes > 0 ? (
                <><b className="text-[var(--negative)] font-medium">−{fm(soldePrev.restantes)}</b> de charges restantes</>
              ) : 'Aucune charge en attente'}
            </div>
          </div>

          {/* Patrimoine total */}
          <div className="editorial-card">
            <div className="flex items-start justify-between mb-2.5">
              <div className="eyebrow">Patrimoine total</div>
              <I.TrendUp s={14} cn="text-[var(--ink-mute)]" />
            </div>
            <div className="text-[30px] leading-none font-semibold tracking-tight num"><Amount v={totalPatrimoine} compact /></div>
            <div className="text-[12.5px] text-[var(--ink-soft)] mt-1.5">Compte + PEA + Crypto + Épargne</div>
          </div>

          {/* Santé budget */}
          <button type="button" onClick={() => setHealthDetailOpen(true)} className="editorial-card text-left hover:border-[var(--border-strong)] transition">
            <div className="flex items-start justify-between mb-3">
              <div className="eyebrow">Santé du budget</div>
              <span className="pulse-tag">
                <span className="dot"></span>
                {budgetHealth.insights.length} insight{budgetHealth.insights.length > 1 ? 's' : ''}
              </span>
            </div>
            <div className="grid grid-cols-[76px_1fr] gap-3.5 items-center">
              <div className="relative w-[76px] h-[76px]">
                <Ring value={healthScore} max={100} size={76} stroke={6}
                      color={healthScore > 75 ? 'oklch(0.55 0.12 155)' : healthScore > 50 ? 'oklch(0.55 0.12 155)' : healthScore > 25 ? 'oklch(0.72 0.13 75)' : 'oklch(0.58 0.18 25)'} />
                <div className="absolute inset-0 flex items-center justify-center text-[21px] font-semibold tracking-tight num">{healthScore}</div>
              </div>
              <div>
                <div className="text-[22px] leading-none font-semibold tracking-tight">{budgetHealth.level}</div>

                      : d.categorie === 'depense' ? { nom: 'Autre', color: '#6b7280', icon: '💸' }

  /* ─────── GOALS ─────── */
  const GoalsView = () => (
    <div className="space-y-5 animate-fade-in">
      <div className="flex items-center justify-between flex-wrap gap-3">
        <div>
          <div className="eyebrow mb-1">En cours</div>
          <h2 className="text-[24px] font-semibold tracking-[-0.02em] m-0">Objectifs d'épargne</h2>
          <p className="text-[13px] text-[var(--ink-mute)] mt-1">Fixez, suivez et atteignez vos ambitions financières.</p>
        </div>
        <BtnPrimary onClick={() => { setEditingGoal(null); setNewGoal({ nom: '', cible: '', actuel: '', deadline: '', color: PALETTE[Math.floor(Math.random()*PALETTE.length)], emoji: '🎯' }); setModal('goal'); }}>
          <I.Plus s={14} sw={2} /> Nouvel objectif
        </BtnPrimary>
      </div>

      {objectifs.length === 0 ? (
        <div className="editorial-card p-12 text-center">
          <div className="text-5xl mb-4 animate-float">🎯</div>
          <h3 className="text-[18px] font-semibold tracking-[-0.015em] mb-2">Aucun objectif pour l'instant</h3>
          <p className="text-[13px] text-[var(--ink-mute)] mb-6 max-w-md mx-auto">Un voyage, un achat, une épargne de précaution — créez votre premier objectif et suivez votre progression en temps réel.</p>
          <BtnPrimary onClick={() => setModal('goal')} className="mx-auto">Créer un objectif</BtnPrimary>
        </div>
      ) : (
        <div className="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-[18px]">
          {objectifs.map(g => {
            const pct = Math.min(100, (g.actuel / g.cible) * 100);
            const restant = g.cible - g.actuel;
            const deadline = g.deadline ? new Date(g.deadline) : null;
            const daysLeft = deadline ? Math.ceil((deadline - new Date()) / 86400000) : null;
            return (
              <div key={g.id} className="editorial-card relative">
                <div className="absolute top-3 right-3 flex gap-1">
                  <button onClick={() => { setEditingGoal(g.id); setNewGoal({ ...g, cible: String(g.cible), actuel: String(g.actuel) }); setModal('goal'); }}
                          className="w-8 h-8 rounded-[8px] flex items-center justify-center btn-tap"
                          style={{ background: 'var(--bg-2)', color: 'var(--ink-soft)', border: '1px solid var(--border)' }}>
                    <I.Edit s={13} />
                  </button>
                  <button onClick={() => { if (confirm(`Supprimer "${g.nom}" ?`)) { setObjectifs(p => p.filter(x => x.id !== g.id)); toast('Objectif supprimé'); } }}
                          className="w-8 h-8 rounded-[8px] flex items-center justify-center btn-tap"
                          style={{ background: 'var(--bg-2)', color: 'var(--ink-soft)', border: '1px solid var(--border)' }}>
                    <I.Trash s={13} />
                  </button>
                </div>
                <div className="w-12 h-12 rounded-[12px] flex items-center justify-center text-[26px] mb-3"
                     style={{ background: 'var(--accent-soft)', border: '1px solid var(--border)' }}>{g.emoji}</div>
                <h3 className="text-[16px] font-semibold tracking-[-0.01em] mb-0.5">{g.nom}</h3>
                {deadline && (
                  <div className="text-[11.5px] text-[var(--ink-mute)] mb-3">
                    {daysLeft > 0 ? `${daysLeft}j restants` : daysLeft === 0 ? "Aujourd'hui !" : 'Expiré'} · {deadline.toLocaleDateString('fr-FR')}
                  </div>
                )}
                <div className="flex items-end justify-between mb-3 mt-3">
                  <div>
                    <div className="text-[28px] font-semibold tracking-[-0.025em] num leading-none"><Amount v={g.actuel} compact /></div>
                    <div className="text-[11.5px] text-[var(--ink-mute)] mt-1.5">sur {fm(g.cible, { compact: true })}</div>

                  <div className="text-right">
                    <div className="text-[20px] font-semibold tracking-tight num">{Math.round(pct)}%</div>
                    <div className="text-[10.5px] uppercase tracking-[0.08em] font-medium text-[var(--ink-mute)] mt-0.5">manque {fm(Math.max(0, restant), { compact: true })}</div>
                  </div>

                <div className="h-1.5 rounded-full overflow-hidden mb-4" style={{ background: 'var(--bg-2)' }}>
                  <div className="h-full rounded-full transition-all duration-500"
                       style={{ width: `${pct}%`, background: 'linear-gradient(90deg, var(--accent), var(--accent-2))' }}></div>
                </div>
                <button onClick={() => {
                          const v = prompt(`Ajouter à "${g.nom}" :`, '');
                          if (v !== null) { const n = pa(v); if (n) setObjectifs(p => p.map(x => x.id === g.id ? { ...x, actuel: x.actuel + n } : x)); }
                        }}
                        className="btn-ed btn-ghost-ed btn-tap w-full">
                  <I.Plus s={14} /> Contribuer
                </button>
              </div>
            );
          })}
        </div>
      )}
