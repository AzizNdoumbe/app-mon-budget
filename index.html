const fm = (amount, opts = {}) => {
  const { compact = false, hideZero = false, forceSign = false } = opts;
  if (hideZero && !amount) return '—';
  const sign = forceSign && amount > 0 ? '+' : '';
  if (compact && Math.abs(amount) >= 1000) {
    return sign + new Intl.NumberFormat('fr-FR', { style: 'currency', currency: 'EUR', notation: 'compact', maximumFractionDigits: 1 }).format(amount);
  }
  return sign + new Intl.NumberFormat('fr-FR', { style: 'currency', currency: 'EUR', minimumFractionDigits: 2, maximumFractionDigits: 2 }).format(amount);
};

  const date = new Date(d);

/* Simple rule-based AI analysis of expenses — returns health score + insights */
const analyzeBudget = ({ depenses, monthlyTotals, categories, resteAVivre, totalDepense }) => {
  const now = new Date();
  const insights = [];
  let score = 100;

  // 1. Budget overspend per category
  Object.entries(categories).forEach(([k, c]) => {
    const d = monthlyTotals[k] || 0;
    if (c.budget > 0 && d > c.budget) {
      const excess = d - c.budget;
      const pct = (excess / c.budget) * 100;
      insights.push({
        severity: pct > 50 ? 'high' : 'med',
        emoji: '🚨',
        title: `Budget ${c.nom} dépassé`,
        detail: `+${excess.toLocaleString('fr-FR', { style: 'currency', currency: 'EUR', maximumFractionDigits: 0 })} au-dessus (${pct.toFixed(0)}%)`
      });
      score -= Math.min(15, pct / 5);
    }
  });

  // Current-month transactions
  const monthDeps = depenses.filter(d => {
    const dd = new Date(d.date);
    return dd.getMonth() === now.getMonth() && dd.getFullYear() === now.getFullYear();
  });

  // 2. Delivery orders pattern (Uber Eats, Deliveroo, etc.)
  const delivPat = /uber.?eat|deliveroo|just.?eat|frichti|tiptoque|livraison|lieferando|foodora|wolt|glovo/i;
  const delivery = monthDeps.filter(d => delivPat.test(d.description || ''));
  if (delivery.length >= 3) {
    const total = delivery.reduce((s, d) => s + (parseFloat(String(d.montant).replace(',','.')) || 0), 0);
    insights.push({
      severity: delivery.length >= 7 ? 'high' : 'med',
      emoji: '🍔',
      title: `${delivery.length} commandes livraison ce mois-ci`,
      detail: `${total.toFixed(0)}€ cumulés — un vrai budget caché`
    });
    score -= delivery.length * 2;
  }

  // 3. Small lunch / café pattern
  const lunchPat = /midi|dej|déjeuner|sandwich|café|coffee|snack|kebab|boulang|starbucks|paul/i;
  const lunches = monthDeps.filter(d => lunchPat.test(d.description || '') && parseFloat(String(d.montant).replace(',','.')) < 15);
  if (lunches.length >= 5) {
    const total = lunches.reduce((s, d) => s + (parseFloat(String(d.montant).replace(',','.')) || 0), 0);
    insights.push({
      severity: 'med',
      emoji: '☕',
      title: `${lunches.length} petits achats du midi`,
      detail: `${total.toFixed(0)}€ — préparer ses repas ferait économiser ici`
    });
    score -= lunches.length;
  }

  // 4. Same-day multi-purchase days (impulsive shopping)
  const byDay = {};
  monthDeps.forEach(d => { byDay[d.date] = (byDay[d.date] || 0) + 1; });
  const bingeDays = Object.values(byDay).filter(c => c >= 4).length;
  if (bingeDays >= 2) {
    insights.push({
      severity: 'low',
      emoji: '🛍️',
      title: `${bingeDays} journées avec plusieurs achats`,
      detail: `Pattern d'achats compulsifs à surveiller`
    });
    score -= bingeDays * 3;
  }

  // 5. Repeated same-description (recurring pattern)
  const descCount = {};
  monthDeps.forEach(d => {
    const desc = (d.description || '').toLowerCase().trim().replace(/[\W_]+/g, ' ').trim();
    if (desc.length > 2) descCount[desc] = (descCount[desc] || 0) + 1;
  });
  Object.entries(descCount).filter(([, c]) => c >= 4).forEach(([desc, count]) => {
    insights.push({
      severity: 'low',
      emoji: '🔁',
      title: `"${desc.charAt(0).toUpperCase() + desc.slice(1)}" × ${count}`,
      detail: `Dépense récurrente non déclarée comme abonnement`
    });
    score -= 2;
  });

  // 6. Micro-purchases (<5€) frequency
  const micro = monthDeps.filter(d => {
    const m = parseFloat(String(d.montant).replace(',','.'));
    return m > 0 && m < 5;
  });
  if (micro.length >= 10) {
    const total = micro.reduce((s, d) => s + (parseFloat(String(d.montant).replace(',','.')) || 0), 0);
    insights.push({
      severity: 'med',
      emoji: '🪙',
      title: `${micro.length} micro-dépenses (< 5€)`,
      detail: `${total.toFixed(0)}€ grignotés — regroupez vos achats`
    });
    score -= micro.length * 0.8;
  }

  // 7. Exceptional expenses frequency
  const exc = monthDeps.filter(d => d.categorie === 'exceptionnel');
  if (exc.length >= 3) {
    insights.push({
      severity: 'high',
      emoji: '⚠️',
      title: `${exc.length} charges exceptionnelles`,
      detail: `Des imprévus à répétition = passer en charges fixes`
    });
    score -= exc.length * 3;
  }

  // 8. Reste à vivre health
  if (resteAVivre > 0 && totalDepense > resteAVivre) {
    insights.push({
      severity: 'high',
      emoji: '📉',
      title: 'Dépassement du reste à vivre',
      detail: `${(totalDepense - resteAVivre).toFixed(0)}€ de plus que prévu`
    });
    score -= 20;
  }

  // 9. Positive insight
  if (insights.length === 0 && monthDeps.length >= 3) {
    insights.push({
      severity: 'good',
      emoji: '✨',
      title: 'Excellent équilibre',
      detail: 'Aucun pattern inquiétant détecté ce mois-ci'
    });
  }
  if (insights.length <= 1 && monthDeps.length >= 8) {
    insights.push({
      severity: 'good',
      emoji: '🏆',
      title: 'Discipline budgétaire',
      detail: `${monthDeps.length} dépenses suivies, budget maîtrisé`
    });
  }

  score = Math.max(0, Math.min(100, Math.round(score)));
  const level = score > 75 ? 'Excellent' : score > 50 ? 'Bon' : score > 25 ? 'Attention' : 'Critique';
  return { score, level, insights };
};

  const [toasts, setToasts] = useState([]);

const Ring = ({ value, max, size = 72, stroke = 6, color = '#8b5cf6' }) => {
  const pct = Math.max(0, Math.min(100, (value / max) * 100));
  const r = (size - stroke) / 2;
  const c = 2 * Math.PI * r;
  return (
    <svg width={size} height={size} className="progress-ring">
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="currentColor" strokeWidth={stroke} className="text-slate-200 dark:text-slate-800" />
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={stroke}
              strokeDasharray={c} strokeDashoffset={c * (1 - pct / 100)} strokeLinecap="round"
              style={{ transition: 'stroke-dashoffset .6s cubic-bezier(.22,1,.36,1)' }} />
    </svg>
  );
};

        });
        const total = Object.values(t).reduce((s, v) => s + v, 0);
        setStatsArch(p => ({ ...p, [last]: { depenses: t, total, date: new Date(ly, lm, 1) } }));
      }
      localStorage.setItem('lastMonthChecked', curr);
    };
    check();
    const i = setInterval(check, 3600000);
    return () => clearInterval(i);
  }, [depenses, budget.categories]);

  /* ---- Auto-process subscriptions ---- */
  useEffect(() => {
    const now = new Date();
    const today = now.getDate();
    const k = mk(now);
    const processed = JSON.parse(localStorage.getItem('abosProcessed') || '{}');
    const pTM = processed[k] || [];
    const newP = [...pTM];
    let changed = false;
    abos.forEach(a => {
      if (a.jour <= today && !pTM.includes(a.id)) {
        const exists = depenses.some(d => d.aboId === a.id && mk(new Date(d.date)) === k);
        if (!exists) {
          const m = pa(a.montant);
          setDepenses(prev => [{
            id: Date.now() + Math.random(),
            categorie: a.categorie, montant: m,
            description: `${a.emoji || '🔁'} ${a.nom}`,
            date: new Date(now.getFullYear(), now.getMonth(), a.jour).toISOString().split('T')[0],
            deduireDuSolde: true, aboId: a.id,
          }, ...prev]);
          setSoldeCompte(s => s - m);
          newP.push(a.id);
          changed = true;
        }
      }
    });
    if (changed) {
      processed[k] = newP;
      localStorage.setItem('abosProcessed', JSON.stringify(processed));
    }
  }, [abos]);

  /* ---- Derived ---- */
  const monthlyTotals = useMemo(() => {
    const now = new Date();
    const t = {};
    Object.keys(budget.categories).forEach(k => t[k] = 0);
    t.exceptionnel = 0; t.depense = 0;
    depenses.forEach(d => {
      const dd = new Date(d.date);
      if (dd.getMonth() === now.getMonth() && dd.getFullYear() === now.getFullYear()) t[d.categorie] = (t[d.categorie] || 0) + pa(d.montant);
    });
    return t;
  }, [depenses, budget.categories]);

  const totalDepense = useMemo(() => Object.values(monthlyTotals).reduce((s, v) => s + v, 0), [monthlyTotals]);
  const currMK = mk();
  const chargesPayeesM = useMemo(() => chargesFixes.filter(c => chargesPayees[currMK]?.[c.id]).reduce((s, c) => s + pa(c.montant), 0), [chargesFixes, chargesPayees, currMK]);
  const chargesNonPayeesM = useMemo(() => chargesFixes.filter(c => !chargesPayees[currMK]?.[c.id]).reduce((s, c) => s + pa(c.montant), 0), [chargesFixes, chargesPayees, currMK]);
  const totalChargesF = budget.chargesfixes + chargesPayeesM + chargesNonPayeesM;
  const resteAVivre = budget.revenus - totalChargesF;

  const soldePrev = useMemo(() => {
    const today = new Date().getDate();
    const target = budget.jourPaiementSalaire || 24;
    let r = 0;
    chargesFixes.forEach(c => {
      if (chargesPayees[currMK]?.[c.id]) return;
      if (today < target) { if (c.jourPaiement >= today && c.jourPaiement <= target) r += pa(c.montant); }
      else { if (c.jourPaiement <= target) r += pa(c.montant); }
    });
    return { restantes: r, solde: soldeCompte - r };
  }, [chargesFixes, chargesPayees, currMK, soldeCompte, budget.jourPaiementSalaire]);

  const notifs = useMemo(() => {
    const today = new Date().getDate();
    return chargesFixes.filter(c => !chargesPayees[currMK]?.[c.id] && c.jourPaiement <= today).map(c => ({ ...c, daysLate: today - c.jourPaiement }));
  }, [chargesFixes, chargesPayees, currMK]);

  const budgetHealth = useMemo(() => analyzeBudget({
    depenses, monthlyTotals, categories: budget.categories, resteAVivre, totalDepense
  }), [depenses, monthlyTotals, budget.categories, resteAVivre, totalDepense]);
  const healthScore = budgetHealth.score;

  const totalPatrimoine = soldeCompte + soldePEA + soldeCrypto + objectifs.reduce((s, g) => s + (g.actuel || 0), 0);

  /* ---- Actions ---- */
  const findLinkedGoalId = (catKey) => {
    const cat = budget.categories[catKey];
    if (!cat) return null;
    const g = objectifs.find(o => normStr(o.nom) === normStr(cat.nom));
    return g ? g.id : null;
  };
  const addDepense = (e) => {
    e?.preventDefault();
    if (!newDepense.montant) return;
    const m = pa(newDepense.montant);
    const linkedGoalId = findLinkedGoalId(newDepense.categorie);
    setDepenses(p => [{ id: Date.now(), ...newDepense, montant: m, linkedGoalId }, ...p]);
    if (newDepense.deduireDuSolde) setSoldeCompte(s => s - m);
    if (linkedGoalId) {
      setObjectifs(p => p.map(g => g.id === linkedGoalId ? { ...g, actuel: (g.actuel || 0) + m } : g));
      const gn = objectifs.find(o => o.id === linkedGoalId);
      toast(`+${fm(m)} ajouté à "${gn?.nom}"`, 'success');
    } else {
      toast('Dépense ajoutée', 'success');
    }
    setNewDepense({ categorie: newDepense.categorie, montant: '', description: '', emoji: '', date: new Date().toISOString().split('T')[0], deduireDuSolde: true });
    setModal(null);
  };
  const deleteDepense = (id) => {
    const d = depenses.find(x => x.id === id);
    if (!d) return;
    if (d.deduireDuSolde !== false) setSoldeCompte(s => s + pa(d.montant));
    if (d.linkedGoalId) {
      setObjectifs(p => p.map(g => g.id === d.linkedGoalId ? { ...g, actuel: Math.max(0, (g.actuel || 0) - pa(d.montant)) } : g));
    }
    setDepenses(p => p.filter(x => x.id !== id));
    toast('Dépense supprimée');
  };
  const addCharge = (e) => {
    e?.preventDefault();
    if (!newCharge.nom || !newCharge.montant) return;
    setChargesFixes(p => [...p, { id: Date.now(), nom: newCharge.nom, montant: pa(newCharge.montant), jourPaiement: parseInt(newCharge.jourPaiement) }]);
    setNewCharge({ nom: '', montant: '', jourPaiement: 1 });
    setModal('charges');
    toast('Charge ajoutée', 'success');
  };
  const toggleCharge = (id) => {
    const c = chargesFixes.find(x => x.id === id);
    if (!c) return;
    const was = chargesPayees[currMK]?.[id];
    setChargesPayees(p => ({ ...p, [currMK]: { ...(p[currMK] || {}), [id]: !was } }));
    setSoldeCompte(s => was ? s + pa(c.montant) : s - pa(c.montant));
  };
  const addRevenu = (e) => {
    e?.preventDefault();
    if (!newRevenu.montant) return;
    setSoldeCompte(s => s + pa(newRevenu.montant));
    setNewRevenu({ type: 'Salaire', montant: '' });
    setModal(null);
    toast('Revenu ajouté', 'success');
  };
  const addGoal = (e) => {
    e?.preventDefault();
    if (!newGoal.nom || !newGoal.cible) return;
    if (editingGoal) setObjectifs(p => p.map(g => g.id === editingGoal ? { ...g, ...newGoal, cible: pa(newGoal.cible), actuel: pa(newGoal.actuel) } : g));
    else setObjectifs(p => [...p, { id: Date.now(), ...newGoal, cible: pa(newGoal.cible), actuel: pa(newGoal.actuel) || 0, createdAt: Date.now() }]);
    setNewGoal({ nom: '', cible: '', actuel: '', deadline: '', color: '#8b5cf6', emoji: '🎯' });
    setEditingGoal(null);
    setModal(null);
    toast(editingGoal ? 'Objectif modifié' : 'Objectif créé', 'success');
  };
  const addAbo = (e) => {
    e?.preventDefault();
    if (!newAbo.nom || !newAbo.montant) return;
    setAbos(p => [...p, { id: Date.now(), ...newAbo, montant: pa(newAbo.montant), jour: parseInt(newAbo.jour) }]);
    setNewAbo({ nom: '', montant: '', categorie: 'perso', jour: 1, emoji: '🔁' });
    setModal('settings');
    toast('Abonnement ajouté', 'success');
  };
  const exportCSV = () => {
    const rows = [['Date', 'Catégorie', 'Description', 'Montant']];
    depenses.forEach(d => {
      const cat = d.categorie === 'exceptionnel' ? 'Exceptionnel' : d.categorie === 'depense' ? 'Autre' : (budget.categories[d.categorie]?.nom || d.categorie);
      rows.push([d.date, cat, (d.description || '').replace(/"/g, '""'), String(d.montant).replace('.', ',')]);
    });
    const csv = '\uFEFF' + rows.map(r => r.map(c => `"${c}"`).join(';')).join('\n');
    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = `budget-${new Date().toISOString().split('T')[0]}.csv`; a.click();
    URL.revokeObjectURL(url);
    toast('Export téléchargé', 'success');
  };
  const signInWithGoogle = async () => {
    const p = new firebase.auth.GoogleAuthProvider();
    p.setCustomParameters({ prompt: 'select_account' });
    try { await auth.signInWithPopup(p); } catch { toast('Erreur de connexion', 'error'); }
  };
  const signOut = () => auth.signOut();

  /* ============================================================
     LOADING / LOGIN
     ============================================================ */
  if (loading) {
    return (
      <div className={`min-h-screen ${darkMode ? 'bg-atmosphere-dark' : 'bg-atmosphere-light'} flex items-center justify-center`}>
        <div className="text-center">
          <div className="w-20 h-20 mx-auto rounded-3xl bg-gradient-to-br from-violet-600 to-indigo-600 shadow-2xl shadow-violet-500/50 flex items-center justify-center text-white text-4xl mb-4 animate-float">€</div>
          <div className="flex gap-1.5 justify-center">
            {[0,1,2].map(i => <div key={i} className="w-2 h-2 rounded-full bg-violet-500 animate-pulse" style={{ animationDelay: `${i * 150}ms` }}></div>)}
          </div>
        </div>
      </div>
    );
  }

  if (!user) {
    return (
      <div className={`min-h-screen ${darkMode ? 'bg-atmosphere-dark' : 'bg-atmosphere-light'} flex items-center justify-center p-6`}>
        <div className="w-full max-w-5xl grid lg:grid-cols-2 gap-12 items-center">
          <div className="text-center lg:text-left">
            <div className="inline-flex w-20 h-20 rounded-3xl bg-gradient-to-br from-violet-600 via-indigo-600 to-sky-500 shadow-2xl shadow-violet-500/40 items-center justify-center text-white text-4xl font-bold mb-8 animate-float">€</div>
            <h1 className="font-display text-5xl lg:text-6xl font-black mb-4 tracking-tight">
              Pilotez votre budget<br/>
              <span className="bg-gradient-to-r from-violet-600 via-indigo-500 to-sky-500 bg-clip-text text-transparent">en temps réel.</span>
            </h1>
            <p className="text-lg text-slate-600 dark:text-slate-400 max-w-md mx-auto lg:mx-0 mb-8">
              Dépenses, épargne, investissements, abonnements — tout ce qu'il faut pour garder le contrôle.
            </p>
            <div className="hidden lg:grid grid-cols-3 gap-3 max-w-lg">
              {[
                { e: '🎯', t: 'Objectifs d\'épargne' },
                { e: '📈', t: 'Projections PEA' },
                { e: '🔁', t: 'Abonnements auto' },
                { e: '📊', t: 'Stats avancées' },
                { e: '🔒', t: 'Données sécurisées' },
                { e: '⚡', t: 'Sync temps réel' },
              ].map((f, i) => (
                <div key={i} className="card p-3 text-center">
                  <div className="text-2xl mb-1">{f.e}</div>
                  <div className="text-xs font-semibold">{f.t}</div>
                </div>
              ))}
            </div>
          </div>

          <div className="glass rounded-3xl p-8 shadow-2xl">
            <h2 className="font-display text-2xl font-bold mb-2">Connexion</h2>
            <p className="text-sm text-slate-600 dark:text-slate-400 mb-6">Continuez avec votre compte Google.</p>
            <button onClick={signInWithGoogle} className="w-full flex items-center justify-center gap-3 px-6 py-4 rounded-2xl bg-white border border-slate-200 hover:border-slate-300 hover:shadow-md transition btn-tap font-semibold text-slate-800">
              <svg width="22" height="22" viewBox="0 0 24 24">
                <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
              </svg>
              <span>Continuer avec Google</span>
            </button>
            <div className="mt-6 text-center text-xs text-slate-500">
              Vos données restent privées et synchronisées entre vos appareils.
            </div>
          </div>
        </div>
      </div>
    );
  }

  /* ============================================================
     VIEWS
     ============================================================ */

  const Amount = ({ v, cn = '', compact = false, forceSign = false }) => (
    <span className={cn}>{hideBalances ? '••••' : fm(v, { compact, forceSign })}</span>
  );

  /* ─────── DASHBOARD ─────── */
  const DashboardView = () => {
    const cats = Object.entries(budget.categories).filter(([, c]) => c.showInDashboard !== false)
      .sort(([ka], [kb]) => (monthlyTotals[kb] || 0) - (monthlyTotals[ka] || 0));

    const recentDepenses = [...depenses].sort((a, b) => new Date(b.date) - new Date(a.date)).slice(0, 6);

    // Mini trend chart
    const chartRef = useRef(null);
    const chartInst = useRef(null);
    const trendData = useMemo(() => {
      const months = [];
      const now = new Date();
      for (let i = 5; i >= 0; i--) {
        const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
        const k = `${d.getFullYear()}-${d.getMonth()}`;
        let total = 0;
        if (k === mk()) total = totalDepense;
        else if (statsArch[k]) total = statsArch[k].total || 0;
        else {
          depenses.forEach(dep => {
            const dd = new Date(dep.date);
            if (dd.getMonth() === d.getMonth() && dd.getFullYear() === d.getFullYear()) total += pa(dep.montant);
          });
        }
        months.push({ label: d.toLocaleDateString('fr-FR', { month: 'short' }), total });
      }
      return months;
    }, [depenses, statsArch, totalDepense]);

    useEffect(() => {
      if (!chartRef.current) return;
      if (chartInst.current) chartInst.current.destroy();
      const ctx = chartRef.current.getContext('2d');
      const g = ctx.createLinearGradient(0, 0, 0, 200);
      g.addColorStop(0, 'rgba(139,92,246,0.4)');
      g.addColorStop(1, 'rgba(139,92,246,0)');
      chartInst.current = new Chart(ctx, {
        type: 'line',
        data: {
          labels: trendData.map(d => d.label),
          datasets: [{
            data: trendData.map(d => d.total),
            borderColor: '#8b5cf6', backgroundColor: g, fill: true, tension: 0.4,
            borderWidth: 3, pointRadius: 5, pointHoverRadius: 7, pointBackgroundColor: '#fff',
            pointBorderWidth: 3, pointBorderColor: '#8b5cf6',
          }]
        },
        options: {
          responsive: true, maintainAspectRatio: false,
          plugins: { legend: { display: false }, tooltip: { callbacks: { label: (c) => fm(c.parsed.y) } } },
          scales: {
            y: { beginAtZero: true, grid: { color: darkMode ? 'rgba(148,163,184,.08)' : 'rgba(148,163,184,.15)' }, ticks: { color: darkMode ? '#64748b' : '#64748b', callback: v => fm(v, { compact: true }) } },
            x: { grid: { display: false }, ticks: { color: darkMode ? '#64748b' : '#64748b' } }
          }
        }
      });
      return () => chartInst.current?.destroy();
    }, [trendData, darkMode]);

    return (
      <div className="space-y-6 animate-fade-in">
        {/* Top stats row */}
        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
          <div className="card p-6 relative overflow-hidden bg-gradient-to-br from-violet-600 via-indigo-600 to-fuchsia-600 text-white border-0">
            <div className="absolute -right-10 -top-10 w-40 h-40 rounded-full bg-white/10 blur-3xl"></div>
            <div className="relative">
              <div className="flex items-center justify-between mb-3">
                <div className="text-xs font-semibold uppercase tracking-wider opacity-80">Solde courant</div>
                <button onClick={() => setHideBalances(!hideBalances)} className="w-8 h-8 rounded-lg bg-white/20 hover:bg-white/30 flex items-center justify-center btn-tap">
                  {hideBalances ? <I.EyeOff s={14} /> : <I.Eye s={14} />}
                </button>
              </div>
              <div className="font-display font-black text-3xl lg:text-4xl mb-1"><Amount v={soldeCompte} /></div>
              <div className="flex gap-2 mt-4">
                <button onClick={() => {
                          const v = prompt('Nouveau solde :', soldeCompte.toFixed(2));
                          if (v !== null) { const n = parseFloat(v.replace(',','.')); if (!isNaN(n)) setSoldeCompte(n); }
                        }}
                        className="flex-1 text-xs font-semibold px-3 py-1.5 rounded-lg bg-white/20 hover:bg-white/30 btn-tap">Modifier</button>
                <button onClick={() => setModal('revenu')} className="flex-1 flex items-center justify-center gap-1 text-xs font-bold px-3 py-1.5 rounded-lg bg-white text-violet-700 hover:bg-white/95 btn-tap">
                  <I.Plus s={12} sw={3}/> Revenu
                </button>
              </div>
            </div>
          </div>

          <div className="card p-6">
            <div className="flex items-center justify-between mb-3">
              <div className="text-xs font-semibold uppercase tracking-wider text-slate-500">Avant salaire</div>
              <div className="w-8 h-8 rounded-lg bg-amber-500/20 text-amber-500 flex items-center justify-center"><I.Calendar s={14} /></div>
            </div>
            <div className={`font-display font-black text-3xl mb-1 ${soldePrev.solde < 0 ? 'text-rose-500' : ''}`}><Amount v={soldePrev.solde} /></div>
            {soldePrev.restantes > 0 ? (
              <div className="text-xs text-slate-500">−{fm(soldePrev.restantes)} charges restantes</div>
            ) : (
              <div className="text-xs text-emerald-500">Aucune charge en attente</div>
            )}
          </div>

          <div className="card p-6">
            <div className="flex items-center justify-between mb-3">
              <div className="text-xs font-semibold uppercase tracking-wider text-slate-500">Patrimoine total</div>
              <div className="w-8 h-8 rounded-lg bg-emerald-500/20 text-emerald-500 flex items-center justify-center"><I.TrendUp s={14} /></div>
            </div>
            <div className="font-display font-black text-3xl mb-1"><Amount v={totalPatrimoine} compact /></div>
            <div className="text-xs text-slate-500">Compte + PEA + Crypto + Épargne</div>
          </div>

          <button onClick={() => setHealthDetailOpen(true)} className="card card-interactive p-6 text-left">
            <div className="flex items-center justify-between mb-3">
              <div className="text-xs font-semibold uppercase tracking-wider text-slate-500">Santé budget IA</div>
              <div className="w-8 h-8 rounded-lg bg-violet-500/20 text-violet-500 flex items-center justify-center"><I.Sparkles s={14} /></div>
            </div>
            <div className="flex items-center gap-3">
              <div className="relative">
                <Ring value={healthScore} max={100} size={56} stroke={6} color={healthScore > 75 ? '#10b981' : healthScore > 50 ? '#84cc16' : healthScore > 25 ? '#f59e0b' : '#ef4444'} />
                <div className="absolute inset-0 flex items-center justify-center font-bold text-sm">{healthScore}</div>
              </div>
              <div className="flex-1 min-w-0">
                <div className="font-display font-bold text-lg">{budgetHealth.level}</div>
                <div className="text-xs text-slate-500">{budgetHealth.insights.length} insight{budgetHealth.insights.length > 1 ? 's' : ''} · Voir détails →</div>
              </div>
            </div>
          </button>
        </div>

        {/* Notifs alert */}
        {notifs.length > 0 && (
          <div className="card border-amber-300/50 dark:border-amber-900/50 bg-gradient-to-r from-amber-50 to-orange-50 dark:from-amber-950/30 dark:to-orange-950/30 p-5">
            <div className="flex items-start gap-3">
              <div className="w-10 h-10 rounded-xl bg-amber-500 text-white flex items-center justify-center shrink-0"><I.Bell s={18} /></div>
              <div className="flex-1 min-w-0">
                <div className="font-display font-bold text-slate-900 dark:text-white mb-1">{notifs.length} charge{notifs.length > 1 ? 's' : ''} en attente de paiement</div>
                <div className="flex flex-wrap gap-2">
                  {notifs.slice(0, 4).map(n => (
                    <button key={n.id} onClick={() => toggleCharge(n.id)}
                            className="flex items-center gap-2 px-3 py-1.5 rounded-lg bg-white dark:bg-slate-800 hover:bg-emerald-50 dark:hover:bg-emerald-900/30 text-sm font-semibold btn-tap">
                      <I.Check s={14} className="text-emerald-500" />
                      <span>{n.nom}</span>
                      <span className="text-slate-500">{fm(n.montant)}</span>
                      {n.daysLate > 0 && <span className="text-[10px] font-bold px-1.5 py-0.5 rounded bg-rose-500/10 text-rose-500">+{n.daysLate}j</span>}
                    </button>
                  ))}
                  {notifs.length > 4 && (
                    <button onClick={() => setModal('charges')} className="px-3 py-1.5 rounded-lg bg-amber-100 dark:bg-amber-900/30 text-amber-700 dark:text-amber-300 text-sm font-semibold btn-tap">
                      +{notifs.length - 4} autres
                    </button>
                  )}
                </div>
              </div>
            </div>
          </div>
        )}

        {/* Main grid */}
        <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
          {/* Categories */}
          <div className="lg:col-span-2 space-y-6">
            <div className="card p-6">
              <div className="flex items-center justify-between mb-5">
                <div>
                  <h3 className="font-display font-bold text-xl">Budgets du mois</h3>
                  <p className="text-xs text-slate-500 mt-0.5">{new Date().toLocaleDateString('fr-FR', { month: 'long', year: 'numeric' })}</p>
                </div>
                <button onClick={() => setView('settings')} className="text-xs font-semibold text-violet-500 hover:text-violet-600">Gérer →</button>
              </div>
              <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
                {cats.map(([k, c]) => {
                  const d = monthlyTotals[k] || 0;
                  const pct = c.budget > 0 ? (d / c.budget) * 100 : 0;
                  const restant = c.budget - d;
                  const exceeded = restant < 0;
                  return (
                    <button key={k} onClick={() => setModal({ type: 'catDetail', key: k })}
                            className="card card-interactive p-4 text-left">
                      <div className="flex items-center gap-3 mb-3">
                        <div className="relative shrink-0">
                          <Ring value={Math.min(pct, 100)} max={100} size={44} stroke={5} color={c.color} />
                          <div className="absolute inset-0 flex items-center justify-center text-base">{c.icon}</div>
                        </div>
                        <div className="flex-1 min-w-0">
                          <div className="font-semibold truncate">{c.nom}</div>
                          <div className="text-[11px] text-slate-500">{fm(d)} / {fm(c.budget)}</div>
                        </div>
                        <div className={`text-right ${exceeded ? 'text-rose-500' : ''}`}>
                          <div className="font-display font-bold text-sm">{exceeded ? '-' : ''}{fm(Math.abs(restant), { compact: true })}</div>
                          <div className="text-[10px] uppercase tracking-wider text-slate-500">{exceeded ? 'Dépassé' : 'Restant'}</div>
                        </div>
                      </div>
                      <div className="h-1.5 rounded-full bg-slate-100 dark:bg-slate-800 overflow-hidden">
                        <div className="h-full rounded-full transition-all duration-500" style={{ width: `${Math.min(pct, 100)}%`, background: exceeded ? '#ef4444' : c.color }}></div>
                      </div>
                    </button>
                  );
                })}
              </div>
            </div>

            {/* Trend chart */}
            <div className="card p-6">
              <div className="flex items-center justify-between mb-4">
                <div>
                  <div className="text-xs font-semibold uppercase tracking-wider text-slate-500">6 derniers mois</div>
                  <div className="font-display font-bold text-xl">Évolution des dépenses</div>
                </div>
                {trendData.length >= 2 && (() => {
                  const last = trendData[trendData.length - 1].total;
                  const prev = trendData[trendData.length - 2].total;
                  const diff = prev ? ((last - prev) / prev) * 100 : 0;
                  const up = diff > 0;
                  return (
                    <div className={`flex items-center gap-1 px-3 py-1.5 rounded-full text-xs font-bold ${up ? 'bg-rose-500/10 text-rose-500' : 'bg-emerald-500/10 text-emerald-500'}`}>
                      {up ? <I.TrendUp s={12} /> : <I.TrendDown s={12} />}
                      {diff > 0 ? '+' : ''}{diff.toFixed(0)}%
                    </div>
                  );
                })()}
              </div>
              <div style={{ height: 220 }}><canvas ref={chartRef}></canvas></div>
            </div>
          </div>

          {/* Right column */}
          <div className="space-y-6">
            {/* Charges */}
            {chargesFixes.length > 0 ? (
              <div className="card p-6">
                <div className="flex items-center justify-between mb-4">
                  <h3 className="font-display font-bold text-lg">Charges fixes</h3>
                  <button onClick={() => setModal('charges')} className="text-xs font-semibold text-violet-500 hover:text-violet-600">Tout voir →</button>
                </div>
                <div className="text-3xl font-display font-black mb-1">{fm(chargesFixes.reduce((s, c) => s + pa(c.montant), 0))}</div>
                <div className="text-xs text-slate-500 mb-4">
                  {chargesFixes.filter(c => chargesPayees[currMK]?.[c.id]).length}/{chargesFixes.length} payées
                </div>
                <div className="h-2 rounded-full bg-slate-100 dark:bg-slate-800 overflow-hidden mb-4">
                  <div className="h-full rounded-full bg-gradient-to-r from-emerald-500 to-green-500 transition-all duration-500"
                       style={{ width: `${(chargesFixes.filter(c => chargesPayees[currMK]?.[c.id]).length / chargesFixes.length) * 100}%` }}></div>
                </div>
                <div className="space-y-1.5 max-h-64 overflow-y-auto scrollbar-hide">
                  {chargesFixes.sort((a, b) => a.jourPaiement - b.jourPaiement).slice(0, 5).map(c => {
                    const paid = chargesPayees[currMK]?.[c.id];
                    return (
                      <div key={c.id} className="flex items-center gap-2">
                        <button onClick={() => toggleCharge(c.id)}
                                className={`w-5 h-5 rounded-md flex items-center justify-center shrink-0 ${paid ? 'bg-emerald-500 text-white' : 'border-2 border-slate-300 dark:border-slate-600'}`}>
                          {paid && <I.Check s={12} sw={3} />}
                        </button>
                        <div className={`flex-1 min-w-0 text-sm ${paid ? 'line-through text-slate-500' : ''}`}>
                          <span className="truncate">{c.nom}</span>
                        </div>
                        <div className={`text-xs font-semibold ${paid ? 'text-slate-500' : ''}`}>{fm(c.montant, { compact: true })}</div>
                      </div>
                    );
                  })}
                </div>
              </div>
            ) : (
              <button onClick={() => setModal('newCharge')} className="w-full card border-dashed p-6 text-center btn-tap hover:border-violet-400">
                <div className="text-3xl mb-2">🔁</div>
                <div className="font-semibold">Ajouter une charge fixe</div>
                <div className="text-xs text-slate-500 mt-1">Loyer, électricité, abonnements…</div>
              </button>
            )}

            {/* Goals preview */}
            {objectifs.length > 0 && (
              <div className="card p-6">
                <div className="flex items-center justify-between mb-4">
                  <h3 className="font-display font-bold text-lg">Objectifs</h3>
                  <button onClick={() => setView('goals')} className="text-xs font-semibold text-violet-500 hover:text-violet-600">Tout voir →</button>
                </div>
                <div className="space-y-3">
                  {objectifs.slice(0, 3).map(g => {
                    const pct = Math.min(100, (g.actuel / g.cible) * 100);
                    return (
                      <div key={g.id}>
                        <div className="flex items-center gap-2 mb-1.5">
                          <span className="text-lg">{g.emoji}</span>
                          <span className="flex-1 font-semibold text-sm truncate">{g.nom}</span>
                          <span className="text-xs font-bold" style={{ color: g.color }}>{Math.round(pct)}%</span>
                        </div>
                        <div className="h-1.5 rounded-full bg-slate-100 dark:bg-slate-800 overflow-hidden">
                          <div className="h-full rounded-full" style={{ width: `${pct}%`, backgroundColor: g.color }}></div>
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>
            )}

            {/* Recent transactions */}
            <div className="card p-6">
              <div className="flex items-center justify-between mb-4">
                <h3 className="font-display font-bold text-lg">Transactions récentes</h3>
                <button onClick={() => setView('history')} className="text-xs font-semibold text-violet-500 hover:text-violet-600">Tout voir →</button>
              </div>
              {recentDepenses.length === 0 ? (
                <div className="py-6 text-center text-sm text-slate-500">Aucune transaction</div>
              ) : (
                <div className="space-y-2">
                  {recentDepenses.map(d => {
                    const c = d.categorie === 'exceptionnel' ? { nom: 'Exceptionnel', color: '#ef4444', icon: '⚠️' }
                      : d.categorie === 'depense' ? { nom: 'Autre', color: '#6b7280', icon: '💸' }
                      : budget.categories[d.categorie] || { nom: d.categorie, color: '#6b7280', icon: '📊' };
                    const displayIcon = d.emoji || c.icon;
                    return (
                      <div key={d.id} className="flex items-center gap-3 py-2">
                        <div className="w-9 h-9 rounded-xl flex items-center justify-center text-base shrink-0" style={{ backgroundColor: c.color + '22' }}>{displayIcon}</div>
                        <div className="flex-1 min-w-0">
                          <div className="font-semibold text-sm truncate">{d.description || c.nom}</div>
                          <div className="text-[11px] text-slate-500">{dateLab(d.date)}</div>
                        </div>
                        <div className="font-display font-bold text-sm">-{fm(d.montant, { compact: true })}</div>
                      </div>
                    );
                  })}
                </div>
              )}
            </div>
          </div>
        </div>
      </div>
    );
  };

  /* ─────── GOALS ─────── */
  const GoalsView = () => (
    <div className="space-y-6 animate-fade-in">
      <div className="flex items-center justify-between flex-wrap gap-3">
        <div>
          <h2 className="font-display font-black text-3xl">🎯 Objectifs d'épargne</h2>
          <p className="text-sm text-slate-500 mt-1">Fixez, suivez et atteignez vos ambitions financières.</p>
        </div>
        <BtnPrimary onClick={() => { setEditingGoal(null); setNewGoal({ nom: '', cible: '', actuel: '', deadline: '', color: PALETTE[Math.floor(Math.random()*PALETTE.length)], emoji: '🎯' }); setModal('goal'); }}>
          <I.Plus s={18} /> Nouvel objectif
        </BtnPrimary>
      </div>

      {objectifs.length === 0 ? (
        <div className="card p-16 text-center">
          <div className="text-7xl mb-4 animate-float">🎯</div>
          <h3 className="font-display font-bold text-2xl mb-2">Aucun objectif pour l'instant</h3>
          <p className="text-slate-500 mb-6 max-w-md mx-auto">Un voyage, un achat, une épargne de précaution — créez votre premier objectif et suivez votre progression en temps réel.</p>
          <BtnPrimary onClick={() => setModal('goal')} className="mx-auto">Créer un objectif</BtnPrimary>
        </div>
      ) : (
        <div className="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-5">
          {objectifs.map(g => {
            const pct = Math.min(100, (g.actuel / g.cible) * 100);
            const restant = g.cible - g.actuel;
            const deadline = g.deadline ? new Date(g.deadline) : null;
            const daysLeft = deadline ? Math.ceil((deadline - new Date()) / 86400000) : null;
            return (
              <div key={g.id} className="card p-6 relative overflow-hidden"
                   style={{ background: `linear-gradient(135deg, ${g.color}18, transparent 70%)` }}>
                <div className="absolute top-3 right-3 flex gap-1">
                  <button onClick={() => { setEditingGoal(g.id); setNewGoal({ ...g, cible: String(g.cible), actuel: String(g.actuel) }); setModal('goal'); }}
                          className="w-8 h-8 rounded-lg bg-white/60 dark:bg-slate-800/60 hover:bg-white dark:hover:bg-slate-700 flex items-center justify-center btn-tap">
                    <I.Edit s={13} />
                  </button>
                  <button onClick={() => { if (confirm(`Supprimer "${g.nom}" ?`)) { setObjectifs(p => p.filter(x => x.id !== g.id)); toast('Objectif supprimé'); } }}
                          className="w-8 h-8 rounded-lg bg-white/60 dark:bg-slate-800/60 hover:bg-rose-500 hover:text-white flex items-center justify-center btn-tap">
                    <I.Trash s={13} />
                  </button>
                </div>
                <div className="text-5xl mb-3">{g.emoji}</div>
                <h3 className="font-display font-bold text-xl mb-1">{g.nom}</h3>
                {deadline && (
                  <div className="text-xs text-slate-500 mb-4">
                    {daysLeft > 0 ? `${daysLeft}j restants` : daysLeft === 0 ? "Aujourd'hui !" : 'Expiré'} · {deadline.toLocaleDateString('fr-FR')}
                  </div>
                )}
                <div className="flex items-end justify-between mb-3">
                  <div>
                    <div className="font-display font-black text-4xl"><Amount v={g.actuel} compact /></div>
                    <div className="text-xs text-slate-500">sur {fm(g.cible, { compact: true })}</div>
                  </div>
                  <div className="text-right">
                    <div className="font-bold text-2xl" style={{ color: g.color }}>{Math.round(pct)}%</div>
                    <div className="text-[10px] text-slate-500">manque {fm(Math.max(0, restant), { compact: true })}</div>
                  </div>
                </div>
                <div className="h-2.5 rounded-full bg-slate-100 dark:bg-slate-800 overflow-hidden mb-4">
                  <div className="h-full rounded-full transition-all duration-500"
                       style={{ width: `${pct}%`, background: `linear-gradient(90deg, ${g.color}, ${g.color}aa)` }}></div>
                </div>
                <button onClick={() => {
                          const v = prompt(`Ajouter à "${g.nom}" :`, '');
                          if (v !== null) { const n = pa(v); if (n) setObjectifs(p => p.map(x => x.id === g.id ? { ...x, actuel: x.actuel + n } : x)); }
                        }}
                        className="w-full py-2.5 rounded-xl bg-white/70 dark:bg-slate-800/70 hover:bg-white dark:hover:bg-slate-700 text-sm font-semibold btn-tap flex items-center justify-center gap-2">
                  <I.Plus s={14} /> Contribuer
                </button>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );

  /* ─────── INVESTMENT ─────── */
  const InvestmentView = ({ type }) => {
    const cfg = type === 'pea'
      ? { title: 'PEA', subtitle: "Plan d'Épargne en Actions", emoji: '📈', colors: 'from-sky-500 via-cyan-500 to-blue-600', solde: soldePEA, setS: setSoldePEA, key: 'pea', rate: 0.07 }
      : { title: 'Crypto', subtitle: 'Cryptomonnaies', emoji: '🪙', colors: 'from-emerald-500 via-green-500 to-teal-600', solde: soldeCrypto, setS: setSoldeCrypto, key: 'crypto', rate: 0.15 };

    const now = new Date();
    const vMois = depenses.filter(d => d.categorie === cfg.key && new Date(d.date).getMonth() === now.getMonth() && new Date(d.date).getFullYear() === now.getFullYear());
    const totalMois = vMois.reduce((s, d) => s + pa(d.montant), 0);
    const autoInvesti = depenses.filter(d => d.categorie === cfg.key).reduce((s, d) => s + pa(d.montant), 0);
    const overrideInvesti = investTotal?.[cfg.key];
    const isOverridden = overrideInvesti !== null && overrideInvesti !== undefined;
    const totalInvesti = isOverridden ? overrideInvesti : autoInvesti;
    const objectif = budget.categories[cfg.key]?.budget || 100;
    const plusValue = cfg.solde - totalInvesti;
    const plusValuePct = totalInvesti > 0 ? (plusValue / totalInvesti) * 100 : 0;
    const lastUpd = investUpdates?.[cfg.key];
    const lastUpdLabel = lastUpd ? (() => {
      const d = new Date(lastUpd);
      const date = d.toLocaleDateString('fr-FR', { day: '2-digit', month: '2-digit', year: 'numeric' });
      const h = d.getHours().toString().padStart(2, '0');
      const m = d.getMinutes().toString().padStart(2, '0');
      return `Mis à jour le ${date} à ${h}h${m}`;
    })() : 'Aucune mise à jour enregistrée';
    const ref = useRef(null), inst = useRef(null);

    const project = (y, m, r) => { const n = y * 12; const rm = r / 12; return m * (((1 + rm) ** n - 1) / rm) * (1 + rm); };

    useEffect(() => {
      if (!ref.current) return;
      if (inst.current) inst.current.destroy();
      const ctx = ref.current.getContext('2d');
      const years = [5, 10, 15, 20, 30];
      const vals = years.map(y => cfg.solde * Math.pow(1 + cfg.rate, y) + project(y, objectif, cfg.rate));
      inst.current = new Chart(ctx, {
        type: 'bar',
        data: {
          labels: years.map(y => `${y} ans`),
          datasets: [{
            data: vals,
            backgroundColor: (c) => {
              const g = c.chart.ctx.createLinearGradient(0, 0, 0, c.chart.height);
              g.addColorStop(0, type === 'pea' ? 'rgba(14,165,233,0.9)' : 'rgba(16,185,129,0.9)');
              g.addColorStop(1, type === 'pea' ? 'rgba(37,99,235,0.5)' : 'rgba(5,150,105,0.5)');
              return g;
            },
            borderRadius: 14, borderSkipped: false,
          }]
        },
        options: {
          responsive: true, maintainAspectRatio: false,
          plugins: { legend: { display: false }, tooltip: { callbacks: { label: c => fm(c.parsed.y, { compact: true }) } } },
          scales: {
            y: { grid: { color: darkMode ? 'rgba(148,163,184,.08)' : 'rgba(148,163,184,.15)' }, ticks: { callback: v => fm(v, { compact: true }) } },
            x: { grid: { display: false }, ticks: { font: { weight: 700 } } }
          }
        }
      });
      return () => inst.current?.destroy();
    }, [cfg.solde, objectif, cfg.rate, type, darkMode]);

    return (
      <div className="space-y-6 animate-fade-in">
        <div>
          <h2 className="font-display font-black text-3xl">{cfg.emoji} {cfg.title}</h2>
          <p className="text-sm text-slate-500 mt-1">{cfg.subtitle}</p>
        </div>

        <div className="grid grid-cols-1 lg:grid-cols-3 gap-5">
          <div className={`card p-7 text-white border-0 bg-gradient-to-br ${cfg.colors} relative overflow-hidden lg:col-span-2`}>
            <div className="absolute -right-20 -top-20 w-60 h-60 rounded-full bg-white/10 blur-3xl"></div>
            <div className="relative">
              <div className="text-xs font-semibold uppercase tracking-wider opacity-80 mb-2">Valeur actuelle</div>
              <div className="font-display font-black text-5xl mb-4"><Amount v={cfg.solde} /></div>
              <div className="grid grid-cols-3 gap-4 max-w-md">
                <div>
                  <div className="text-[10px] uppercase tracking-wider opacity-80">Versé ce mois</div>
                  <div className="font-bold text-lg"><Amount v={totalMois} compact /></div>
                </div>
                <div>
                  <div className="text-[10px] uppercase tracking-wider opacity-80">Total versé</div>
                  <div className="font-bold text-lg"><Amount v={totalInvesti} compact /></div>
                </div>
                <div>
                  <div className="text-[10px] uppercase tracking-wider opacity-80">Plus-value</div>
                  <div className="font-bold text-lg"><Amount v={plusValue} compact forceSign /></div>
                </div>
              </div>
              <button onClick={() => {
                        const v = prompt(`Valeur actuelle ${cfg.title} :`, cfg.solde.toFixed(2));
                        if (v !== null) { const n = parseFloat(v.replace(',','.')); if (!isNaN(n)) { cfg.setS(n); setInvestUpdates(p => ({ ...p, [cfg.key]: Date.now() })); } }
                      }}
                      className="mt-5 px-4 py-2 rounded-lg bg-white/20 hover:bg-white/30 text-sm font-semibold btn-tap">
                Mettre à jour la valeur
              </button>
              <div className="text-[11px] opacity-70 mt-2">{lastUpdLabel}</div>
            </div>
          </div>

          <div className="card p-6">
            <div className="flex items-center justify-between mb-3">
              <h3 className="font-display font-bold text-lg">Objectif mensuel</h3>
              <button onClick={() => {
                        const v = prompt(`Nouvel objectif mensuel :`, objectif);
                        if (v !== null) { const n = pa(v); if (n >= 0) setBudget({ ...budget, categories: { ...budget.categories, [cfg.key]: { ...budget.categories[cfg.key], budget: n } } }); }
                      }}
                      className="text-xs font-semibold text-violet-500">Modifier</button>
            </div>
            <div className="flex items-end justify-between mb-2">
              <div className="font-display font-black text-2xl">{fm(totalMois)}</div>
              <div className="text-sm text-slate-500">/ {fm(objectif)}</div>
            </div>
            <div className="h-2 rounded-full bg-slate-100 dark:bg-slate-800 overflow-hidden mb-3">
              <div className={`h-full rounded-full bg-gradient-to-r ${cfg.colors}`} style={{ width: `${Math.min((totalMois / objectif) * 100, 100)}%` }}></div>
            </div>
            {totalMois >= objectif ? (
              <div className="text-center text-sm font-semibold text-emerald-500">🎉 Objectif atteint !</div>
            ) : (
              <div className="text-center text-xs text-slate-500">Encore {fm(objectif - totalMois)} ce mois-ci</div>
            )}
          </div>
        </div>

        <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
          <div className="card p-5">
            <div className="flex items-center justify-between mb-1">
              <div className="text-xs font-semibold uppercase tracking-wider text-slate-500">Total versé depuis le début</div>
              <button onClick={() => {
                        const v = prompt(`Total versé ${cfg.title} (montant cumulé réel) :`, totalInvesti.toFixed(2));
                        if (v === null) return;
                        const s = v.trim();
                        if (s === '') { setInvestTotal(p => ({ ...p, [cfg.key]: null })); toast('Retour au calcul auto', 'success'); return; }
                        const n = parseFloat(s.replace(',', '.'));
                        if (!isNaN(n) && n >= 0) { setInvestTotal(p => ({ ...p, [cfg.key]: n })); toast('Total versé modifié', 'success'); }
                      }}
                      className="text-[11px] font-semibold text-violet-500 hover:text-violet-600">
                Modifier
              </button>
            </div>
            <div className="font-display font-black text-2xl"><Amount v={totalInvesti} /></div>
            <div className="text-xs text-slate-500 mt-1">
              {isOverridden ? (
                <span className="inline-flex items-center gap-1">
                  <span className="w-1.5 h-1.5 rounded-full bg-violet-500"></span>
                  Valeur manuelle · <button onClick={() => { setInvestTotal(p => ({ ...p, [cfg.key]: null })); toast('Retour au calcul auto'); }} className="underline hover:text-violet-500">réinitialiser</button>
                </span>
              ) : (
                <>{depenses.filter(d => d.categorie === cfg.key).length} versement{depenses.filter(d => d.categorie === cfg.key).length > 1 ? 's' : ''} cumulés</>
              )}
            </div>
          </div>
          <div className="card p-5">
            <div className="text-xs font-semibold uppercase tracking-wider text-slate-500 mb-1">{plusValue >= 0 ? 'Plus-value' : 'Moins-value'} nette</div>
            <div className={`font-display font-black text-2xl ${plusValue > 0 ? 'text-emerald-500' : plusValue < 0 ? 'text-rose-500' : ''}`}>
              <Amount v={plusValue} forceSign />
            </div>
            <div className="text-xs text-slate-500 mt-1">
              {totalInvesti > 0 ? `${plusValue >= 0 ? '+' : ''}${plusValuePct.toFixed(1)}% de rendement` : 'Valeur actuelle − total versé'}
            </div>
          </div>
          <div className="card p-5">
            <div className="text-xs font-semibold uppercase tracking-wider text-slate-500 mb-1">Versements ce mois-ci</div>
            <div className="font-display font-black text-2xl"><Amount v={totalMois} /></div>
            <div className="text-xs text-slate-500 mt-1">{vMois.length} transaction{vMois.length > 1 ? 's' : ''}</div>
          </div>
        </div>

        <div className="grid grid-cols-1 lg:grid-cols-3 gap-5">
          <div className="card p-6 lg:col-span-2">
            <div className="mb-4">
              <div className="font-display font-bold text-xl">🚀 Projection long terme</div>
              <div className="text-xs text-slate-500 mt-1">Avec {fm(objectif)}/mois + solde actuel, à {(cfg.rate * 100).toFixed(0)}% annuel</div>
            </div>
            <div style={{ height: 280 }}><canvas ref={ref}></canvas></div>
          </div>

          <div className="card p-6">
            <div className="flex items-center justify-between mb-4">
              <h3 className="font-display font-bold text-lg">Versements du mois</h3>
              <div className="text-xs text-slate-500">{vMois.length}</div>
            </div>
            {vMois.length === 0 ? (
              <div className="py-6 text-center text-sm text-slate-500">Aucun versement ce mois-ci</div>
            ) : (
              <div className="space-y-2 max-h-96 overflow-y-auto">
                {vMois.map(d => (
                  <div key={d.id} className="flex items-center gap-3 p-2 rounded-lg">
                    <div className={`w-9 h-9 rounded-xl bg-gradient-to-br ${cfg.colors} flex items-center justify-center text-white text-sm`}>{cfg.emoji}</div>
                    <div className="flex-1 min-w-0">
                      <div className="font-semibold text-sm truncate">{d.description || `Versement ${cfg.title}`}</div>
                      <div className="text-[11px] text-slate-500">{dateLab(d.date)}</div>
                    </div>
                    <div className="font-bold text-sm text-emerald-500">+{fm(d.montant, { compact: true })}</div>
                  </div>
                ))}
              </div>
            )}
          </div>
        </div>
      </div>
    );
  };

  /* ─────── STATS ─────── */
  const StatsView = () => {
    const [selK, setSelK] = useState(mk());
    const lineRef = useRef(null), lineI = useRef(null);
    const donutRef = useRef(null), donutI = useRef(null);

    const getTotals = (k) => {
      const [y, m] = k.split('-').map(Number);
      const t = {};
      Object.keys(budget.categories).forEach(x => t[x] = 0);
      t.exceptionnel = 0; t.depense = 0;
      depenses.forEach(d => {
        const dd = new Date(d.date);
        if (dd.getMonth() === m && dd.getFullYear() === y) t[d.categorie] = (t[d.categorie] || 0) + pa(d.montant);
      });
      return t;
    };

    const isCurr = selK === mk();
    const totals = isCurr ? getTotals(selK) : (statsArch[selK]?.depenses || getTotals(selK));
    const total = Object.values(totals).reduce((s, v) => s + v, 0);
    const availMonths = useMemo(() => {
      const all = new Set([mk(), ...Object.keys(statsArch)]);
      depenses.forEach(d => { const dd = new Date(d.date); all.add(`${dd.getFullYear()}-${dd.getMonth()}`); });
      return Array.from(all).sort().reverse();
    }, [statsArch, depenses]);

    const trendData = useMemo(() => {
      const months = [];
      const now = new Date();
      for (let i = 11; i >= 0; i--) {
        const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
        const k = `${d.getFullYear()}-${d.getMonth()}`;
        const t = k === mk() ? getTotals(k) : (statsArch[k]?.depenses || getTotals(k));
        months.push({ label: d.toLocaleDateString('fr-FR', { month: 'short' }), total: Object.values(t).reduce((s, v) => s + v, 0) });
      }
      return months;
    }, [statsArch, depenses, budget.categories]);

    useEffect(() => {
      if (!lineRef.current) return;
      if (lineI.current) lineI.current.destroy();
      const ctx = lineRef.current.getContext('2d');
      const g = ctx.createLinearGradient(0, 0, 0, 300);
      g.addColorStop(0, 'rgba(139,92,246,0.4)');
      g.addColorStop(1, 'rgba(139,92,246,0)');
      lineI.current = new Chart(ctx, {
        type: 'line',
        data: { labels: trendData.map(d => d.label),
          datasets: [{ data: trendData.map(d => d.total), borderColor: '#8b5cf6', backgroundColor: g, fill: true, tension: 0.4, borderWidth: 3, pointRadius: 4, pointHoverRadius: 7, pointBackgroundColor: '#fff', pointBorderColor: '#8b5cf6', pointBorderWidth: 2 }] },
        options: {
          responsive: true, maintainAspectRatio: false,
          plugins: { legend: { display: false }, tooltip: { callbacks: { label: c => fm(c.parsed.y) } } },
          scales: {
            y: { beginAtZero: true, grid: { color: darkMode ? 'rgba(148,163,184,.08)' : 'rgba(148,163,184,.15)' }, ticks: { callback: v => fm(v, { compact: true }) } },
            x: { grid: { display: false } }
          }
        }
      });
      return () => lineI.current?.destroy();
    }, [trendData, darkMode]);

    useEffect(() => {
      if (!donutRef.current) return;
      if (donutI.current) donutI.current.destroy();
      const entries = Object.entries(budget.categories)
        .map(([k, c]) => ({ k, c, d: totals[k] || 0 })).filter(x => x.d > 0).sort((a, b) => b.d - a.d);
      const others = (totals.exceptionnel || 0) + (totals.depense || 0);
      if (others > 0) entries.push({ k: '__other', c: { nom: 'Autres', color: '#64748b' }, d: others });
      if (entries.length === 0) return;
      donutI.current = new Chart(donutRef.current.getContext('2d'), {
        type: 'doughnut',
        data: {
          labels: entries.map(e => e.c.nom),
          datasets: [{ data: entries.map(e => e.d), backgroundColor: entries.map(e => e.c.color), borderWidth: 0 }]
        },
        options: {
          responsive: true, maintainAspectRatio: false, cutout: '72%',
          plugins: { legend: { display: false }, tooltip: { callbacks: { label: c => `${c.label}: ${fm(c.parsed)}` } } }
        }
      });
      return () => donutI.current?.destroy();
    }, [totals, budget.categories]);

    const topCats = Object.entries(budget.categories).map(([k, c]) => ({ k, c, d: totals[k] || 0 })).filter(x => x.d > 0).sort((a, b) => b.d - a.d);
    const dayCount = isCurr ? new Date().getDate() : new Date(new Date(parseInt(selK.split('-')[0]), parseInt(selK.split('-')[1]) + 1, 0)).getDate();
    const txCount = depenses.filter(d => { const dd = new Date(d.date); const [y, m] = selK.split('-').map(Number); return dd.getMonth() === m && dd.getFullYear() === y; }).length;

    return (
      <div className="space-y-6 animate-fade-in">
        <div>
          <h2 className="font-display font-black text-3xl">📊 Statistiques</h2>
          <p className="text-sm text-slate-500 mt-1">Analysez et comprenez vos dépenses.</p>
        </div>

        <div className="card p-6">
          <div className="flex items-center justify-between mb-4">
            <div>
              <div className="text-xs font-semibold uppercase tracking-wider text-slate-500">12 derniers mois</div>
              <div className="font-display font-bold text-xl">Évolution globale</div>
            </div>
            {trendData.length >= 2 && (() => {
              const last = trendData[trendData.length - 1].total;
              const prev = trendData[trendData.length - 2].total;
              const diff = prev ? ((last - prev) / prev) * 100 : 0;
              const up = diff > 0;
              return (
                <div className={`flex items-center gap-1 px-3 py-1.5 rounded-full text-xs font-bold ${up ? 'bg-rose-500/10 text-rose-500' : 'bg-emerald-500/10 text-emerald-500'}`}>
                  {up ? <I.TrendUp s={12} /> : <I.TrendDown s={12} />} {diff > 0 ? '+' : ''}{diff.toFixed(0)}%
                </div>
              );
            })()}
          </div>
          <div style={{ height: 260 }}><canvas ref={lineRef}></canvas></div>
        </div>

        <div className="flex gap-2 overflow-x-auto pb-2 -mx-1 px-1">
          {availMonths.slice(0, 12).map(k => {
            const t = k === mk() ? Object.values(getTotals(k)).reduce((s, v) => s + v, 0) : (statsArch[k]?.total || Object.values(getTotals(k)).reduce((s, v) => s + v, 0));
            const sel = selK === k;
            return (
              <button key={k} onClick={() => setSelK(k)}
                      className={`shrink-0 px-5 py-3 rounded-2xl text-left transition btn-tap ${sel ? 'bg-gradient-to-br from-violet-600 to-indigo-600 text-white shadow-lg shadow-violet-500/30' : 'card'}`}>
                <div className="text-[10px] font-semibold uppercase tracking-wider opacity-70">{mShort(k)}</div>
                <div className="text-sm font-bold">{fm(t, { compact: true })}</div>
              </button>
            );
          })}
        </div>

        <div className="grid grid-cols-1 lg:grid-cols-3 gap-5">
          <div className="card p-6 lg:col-span-1">
            <div className="mb-2 text-xs font-semibold uppercase tracking-wider text-slate-500">{mName(selK)}</div>
            <div className="font-display font-black text-3xl mb-6">{fm(total)}</div>
            <div className="relative" style={{ height: 220 }}>
              {total > 0 ? <canvas ref={donutRef}></canvas> : <div className="h-full flex items-center justify-center text-sm text-slate-500">Aucune donnée</div>}
            </div>
          </div>

          <div className="card p-6 lg:col-span-2">
            <h3 className="font-display font-bold text-xl mb-5">Répartition par catégorie</h3>
            {topCats.length === 0 ? (
              <div className="py-12 text-center text-sm text-slate-500">Aucune dépense sur ce mois</div>
            ) : (
              <div className="space-y-4">
                {topCats.map(({ k, c, d }) => {
                  const pct = (d / total) * 100;
                  return (
                    <div key={k}>
                      <div className="flex items-center gap-3 mb-1.5">
                        <span className="text-lg">{c.icon}</span>
                        <span className="font-semibold flex-1">{c.nom}</span>
                        <span className="text-xs font-bold text-slate-500">{pct.toFixed(0)}%</span>
                        <span className="font-display font-bold">{fm(d)}</span>
                      </div>
                      <div className="h-2 rounded-full bg-slate-100 dark:bg-slate-800 overflow-hidden">
                        <div className="h-full rounded-full" style={{ width: `${pct}%`, backgroundColor: c.color }}></div>
                      </div>
                    </div>
                  );
                })}
              </div>
            )}
          </div>
        </div>

        <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
          <div className="card p-5">
            <div className="text-xs font-semibold uppercase tracking-wider text-slate-500 mb-1">Moyenne/jour</div>
            <div className="font-display font-black text-2xl">{fm(total / Math.max(1, dayCount), { compact: true })}</div>
          </div>
          <div className="card p-5">
            <div className="text-xs font-semibold uppercase tracking-wider text-slate-500 mb-1">Transactions</div>
            <div className="font-display font-black text-2xl">{txCount}</div>
          </div>
          <div className="card p-5">
            <div className="text-xs font-semibold uppercase tracking-wider text-slate-500 mb-1">Panier moyen</div>
            <div className="font-display font-black text-2xl">{fm(txCount > 0 ? total / txCount : 0, { compact: true })}</div>
          </div>
          <div className="card p-5">
            <div className="text-xs font-semibold uppercase tracking-wider text-slate-500 mb-1">Top catégorie</div>
            <div className="font-display font-black text-2xl truncate">{topCats[0] ? topCats[0].c.icon + ' ' + topCats[0].c.nom.split(' ')[0] : '—'}</div>
          </div>
        </div>
      </div>
    );
  };

  /* ─────── HISTORY ─────── */
  const HistoryView = () => {
    const filtered = useMemo(() => {
      const q = searchQuery.toLowerCase();
      return depenses.filter(d => {
        if (filterCat !== 'all' && d.categorie !== filterCat) return false;
        if (q && !(d.description || '').toLowerCase().includes(q)) return false;
        return true;
      });
    }, [depenses, searchQuery, filterCat]);

    const grouped = useMemo(() => {
      const g = {};
      filtered.forEach(d => { if (!g[d.date]) g[d.date] = []; g[d.date].push(d); });
      return Object.entries(g).sort((a, b) => b[0].localeCompare(a[0]));
    }, [filtered]);

    const totalFiltered = filtered.reduce((s, d) => s + pa(d.montant), 0);

    return (
      <div className="space-y-5 animate-fade-in">
        <div className="flex items-center justify-between flex-wrap gap-3">
          <div>
            <h2 className="font-display font-black text-3xl">📋 Historique</h2>
            <p className="text-sm text-slate-500 mt-1">{filtered.length} transaction{filtered.length > 1 ? 's' : ''} · {fm(totalFiltered)}</p>
          </div>
          <BtnGhost onClick={exportCSV}>
            <I.Download s={16} /> Exporter CSV
          </BtnGhost>
        </div>

        <div className="card p-4">
          <div className="relative mb-4">
            <I.Search s={18} cn="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 pointer-events-none" />
            <input type="text" value={searchQuery} onChange={(e) => setSearchQuery(e.target.value)} placeholder="Rechercher une description…"
                   className="w-full pl-11 pr-4 py-3 rounded-xl bg-slate-100 dark:bg-slate-800 border border-transparent focus:ring-2 focus:ring-violet-500 focus:border-violet-500/50 outline-none" />
          </div>
          <div className="flex gap-2 overflow-x-auto scrollbar-hide">
            <button onClick={() => setFilterCat('all')}
                    className={`shrink-0 px-4 py-2 rounded-full text-xs font-semibold whitespace-nowrap transition ${filterCat === 'all' ? 'bg-slate-900 dark:bg-white text-white dark:text-slate-900' : 'bg-slate-100 dark:bg-slate-800'}`}>
              Toutes ({depenses.length})
            </button>
            {Object.entries(budget.categories).map(([k, c]) => {
              const n = depenses.filter(d => d.categorie === k).length;
              if (!n) return null;
              return (
                <button key={k} onClick={() => setFilterCat(k)}
                        className={`shrink-0 flex items-center gap-1.5 px-4 py-2 rounded-full text-xs font-semibold whitespace-nowrap transition ${filterCat === k ? 'text-white' : 'bg-slate-100 dark:bg-slate-800'}`}
                        style={filterCat === k ? { backgroundColor: c.color } : {}}>
                  {c.icon} {c.nom} ({n})
                </button>
              );
            })}
          </div>
        </div>

        {grouped.length === 0 ? (
          <div className="card p-16 text-center">
            <div className="text-5xl mb-3">🔍</div>
            <div className="text-slate-500">Aucune dépense trouvée</div>
          </div>
        ) : (
          <div className="space-y-5">
            {grouped.map(([date, items]) => {
              const total = items.reduce((s, d) => s + pa(d.montant), 0);
              return (
                <div key={date}>
                  <div className="flex items-center justify-between mb-2 px-1">
                    <div className="text-xs font-bold uppercase tracking-wider text-slate-500">{dateLab(date)}</div>
                    <div className="text-xs font-semibold text-slate-500">-{fm(total)}</div>
                  </div>
                  <div className="card overflow-hidden divide-y divide-slate-100 dark:divide-slate-800/50">
                    {items.map(d => {
                      const c = d.categorie === 'exceptionnel' ? { nom: 'Exceptionnel', color: '#ef4444', icon: '⚠️' }
                        : d.categorie === 'depense' ? { nom: 'Autre', color: '#6b7280', icon: '💸' }
                        : budget.categories[d.categorie] || { nom: d.categorie, color: '#6b7280', icon: '📊' };
                      const displayIcon = d.emoji || c.icon;
                      return (
                        <div key={d.id} className="flex items-center gap-3 p-4 group hover:bg-slate-50 dark:hover:bg-slate-800/30 transition">
                          <div className="w-11 h-11 rounded-xl flex items-center justify-center text-lg shrink-0" style={{ backgroundColor: c.color + '22' }}>{displayIcon}</div>
                          <div className="flex-1 min-w-0">
                            <div className="font-semibold truncate">{d.description || c.nom}</div>
                            <div className="text-xs text-slate-500">{c.nom}</div>
                          </div>
                          <div className="text-right">
                            <div className="font-display font-bold">-{fm(d.montant)}</div>
                            <button onClick={() => { if (confirm('Supprimer cette dépense ?')) deleteDepense(d.id); }}
                                    className="text-xs text-rose-500 hover:underline opacity-0 group-hover:opacity-100 transition">
                              Supprimer
                            </button>
                          </div>
                        </div>
                      );
                    })}
                  </div>
                </div>
              );
            })}
          </div>
        )}
      </div>
    );
  };

  /* ─────── SETTINGS ─────── */
  const SettingsView = () => {
    const [editForm, setEditForm] = useState({ nom: '', budget: '', color: '#8b5cf6', icon: '📊', showInDashboard: true });

    const saveCategory = () => {
      if (!editForm.nom || !editForm.budget) return;
      if (editingCat === '__new__') {
        const key = editForm.nom.toLowerCase().replace(/\s+/g, '_').replace(/[^a-z0-9_]/g, '');
        if (!key || budget.categories[key]) { toast('Nom déjà utilisé', 'error'); return; }
        setBudget({ ...budget, categories: { ...budget.categories, [key]: { nom: editForm.nom, budget: pa(editForm.budget), color: editForm.color, icon: editForm.icon, showInDashboard: editForm.showInDashboard } } });
      } else {
        setBudget({ ...budget, categories: { ...budget.categories, [editingCat]: { ...budget.categories[editingCat], nom: editForm.nom, budget: pa(editForm.budget), color: editForm.color, icon: editForm.icon, showInDashboard: editForm.showInDashboard } } });
      }
      setEditingCat(null);
      toast('Enregistré', 'success');
    };

    const startEdit = (key) => {
      const c = budget.categories[key];
      setEditForm({ nom: c.nom, budget: String(c.budget), color: c.color, icon: c.icon || '📊', showInDashboard: c.showInDashboard !== false });
      setEditingCat(key);
    };

    return (
      <div className="space-y-6 animate-fade-in">
        <div>
          <h2 className="font-display font-black text-3xl">⚙️ Paramètres</h2>
          <p className="text-sm text-slate-500 mt-1">Personnalisez votre application.</p>
        </div>

        <div className="grid grid-cols-1 lg:grid-cols-3 gap-5">
          <div className="card p-6">
            <div className="flex items-center gap-3 mb-4">
              <div className="w-14 h-14 rounded-2xl bg-gradient-to-br from-violet-500 to-indigo-600 flex items-center justify-center text-white font-bold text-xl">
                {(user.displayName || user.email || '?')[0].toUpperCase()}
              </div>
              <div className="flex-1 min-w-0">
                <div className="font-semibold truncate">{user.displayName || 'Utilisateur'}</div>
                <div className="text-xs text-slate-500 truncate">{user.email}</div>
              </div>
            </div>
            <button onClick={signOut} className="w-full px-4 py-2.5 rounded-xl text-sm font-semibold bg-rose-50 hover:bg-rose-100 dark:bg-rose-950/30 dark:hover:bg-rose-950/50 text-rose-600 dark:text-rose-300 btn-tap flex items-center justify-center gap-2">
              <I.LogOut s={15} /> Déconnexion
            </button>
          </div>

          <div className="card p-6 divide-y divide-slate-100 dark:divide-slate-800/50">
            <div className="flex items-center justify-between pb-4">
              <div>
                <div className="font-semibold">Mode sombre</div>
                <div className="text-xs text-slate-500">Thème adapté à la nuit</div>
              </div>
              <button onClick={() => setDarkMode(!darkMode)} className={`relative w-12 h-7 rounded-full transition ${darkMode ? 'bg-violet-600' : 'bg-slate-300'}`}>
                <div className={`absolute top-0.5 w-6 h-6 rounded-full bg-white shadow transition-transform ${darkMode ? 'translate-x-5' : 'translate-x-0.5'}`}></div>
              </button>
            </div>
            <div className="flex items-center justify-between py-4">
              <div>
                <div className="font-semibold">Masquer montants</div>
                <div className="text-xs text-slate-500">Confidentialité</div>
              </div>
              <button onClick={() => setHideBalances(!hideBalances)} className={`relative w-12 h-7 rounded-full transition ${hideBalances ? 'bg-violet-600' : 'bg-slate-300'}`}>
                <div className={`absolute top-0.5 w-6 h-6 rounded-full bg-white shadow transition-transform ${hideBalances ? 'translate-x-5' : 'translate-x-0.5'}`}></div>
              </button>
            </div>
            <div className="pt-4">
              <button onClick={exportCSV} className="w-full px-4 py-2.5 rounded-xl text-sm font-semibold bg-slate-100 dark:bg-slate-800 hover:bg-slate-200 dark:hover:bg-slate-700 btn-tap flex items-center justify-center gap-2">
                <I.Download s={15} /> Exporter CSV
              </button>
            </div>
          </div>

          <div className="card p-6">
            <div className="font-semibold mb-1">💰 Jour du salaire</div>
            <div className="text-xs text-slate-500 mb-3">Calcul du solde prévisionnel</div>
            <div className="flex items-center gap-3">
              <input type="number" min="1" max="31" value={budget.jourPaiementSalaire || 24}
                     onChange={(e) => { const v = parseInt(e.target.value); if (v >= 1 && v <= 31) setBudget({ ...budget, jourPaiementSalaire: v }); }}
                     className="flex-1 px-4 py-3 rounded-xl bg-slate-100 dark:bg-slate-800 border-0 focus:ring-2 focus:ring-violet-500 outline-none" />
              <span className="text-sm text-slate-500">du mois</span>
            </div>
            <div className="mt-4 pt-4 border-t border-slate-100 dark:border-slate-800/50">
              <div className="font-semibold mb-1">Revenus mensuels</div>
              <div className="text-xs text-slate-500 mb-3">Pour calculer le reste à vivre</div>
              <input type="number" value={budget.revenus}
                     onChange={(e) => setBudget({ ...budget, revenus: pa(e.target.value) })}
                     className="w-full px-4 py-3 rounded-xl bg-slate-100 dark:bg-slate-800 border-0 focus:ring-2 focus:ring-violet-500 outline-none" />
            </div>
          </div>
        </div>

        {/* Categories management */}
        <div className="card p-6">
          <div className="flex items-center justify-between mb-5">
            <div>
              <h3 className="font-display font-bold text-xl">📊 Catégories</h3>
              <p className="text-xs text-slate-500 mt-0.5">{Object.keys(budget.categories).length} catégorie{Object.keys(budget.categories).length > 1 ? 's' : ''}</p>
            </div>
            <BtnPrimary onClick={() => { setEditForm({ nom: '', budget: '', color: PALETTE[Math.floor(Math.random()*PALETTE.length)], icon: '📊', showInDashboard: true }); setEditingCat('__new__'); }}>
              <I.Plus s={16}/> Nouvelle
            </BtnPrimary>
          </div>

          {editingCat && (
            <div className="card border-violet-300 dark:border-violet-800 p-5 mb-5 animate-scale-in space-y-4">
              <input type="text" value={editForm.nom} onChange={(e) => setEditForm({ ...editForm, nom: e.target.value })} placeholder="Nom de la catégorie"
                     className="w-full px-4 py-3 rounded-xl bg-slate-100 dark:bg-slate-800 border-0 focus:ring-2 focus:ring-violet-500 outline-none font-semibold" />
              <Field label="Icône">
                <EmojiPicker value={editForm.icon} onChange={(e) => setEditForm({ ...editForm, icon: e })} />
              </Field>
              <div className="grid grid-cols-2 gap-3">
                <Field label="Budget (€)">
                  <input type="number" value={editForm.budget} onChange={(e) => setEditForm({ ...editForm, budget: e.target.value })} placeholder="0"
                         className="w-full px-4 py-3 rounded-xl bg-slate-100 dark:bg-slate-800 border-0 focus:ring-2 focus:ring-violet-500 outline-none" />
                </Field>
                <Field label="Couleur">
                  <input type="color" value={editForm.color} onChange={(e) => setEditForm({ ...editForm, color: e.target.value })}
                         className="w-full h-12 rounded-xl border-0 cursor-pointer bg-transparent" />
                </Field>
              </div>
              <div className="flex flex-wrap gap-2">
                {PALETTE.map(c => (
                  <button key={c} type="button" onClick={() => setEditForm({ ...editForm, color: c })}
                          className={`w-8 h-8 rounded-full transition ${editForm.color === c ? 'ring-4 ring-offset-2 ring-slate-400 dark:ring-offset-slate-900' : ''}`}
